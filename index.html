<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QR文本库">
<meta name="theme-color" content="#0f0f1a">
<title>QR 文本库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;min-height:-webkit-fill-available;user-select:none;-webkit-user-select:none;overflow-x:hidden}

.nav{display:flex;align-items:center;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px 16px;background:#1a1a2e;position:sticky;top:0;z-index:10;gap:12px;border-bottom:1px solid #2a2a4a}
.nav-back{width:32px;height:32px;border-radius:50%;background:#2a2a4a;border:none;color:#ccc;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.nav-back.visible{display:flex}
.nav-title{font-size:16px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.page{display:none;padding:16px;padding-bottom:100px}
.page.active{display:block}

/* L1 */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-card{border-radius:16px;padding:24px 12px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;min-height:80px;display:flex;align-items:center;justify-content:center;position:relative}
.cat-card:active{transform:scale(.96)}
.cat-card.dragging{opacity:.85;transform:scale(1.05);z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.cat-card.drop-target{outline:3px dashed rgba(255,255,255,.6);outline-offset:2px}
.cat-name{font-size:15px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);line-height:1.3}
.cat-count{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}

.ghost{position:fixed;pointer-events:none;z-index:200;opacity:.9;transform:scale(1.08);box-shadow:0 12px 40px rgba(0,0,0,.6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff;text-align:center;padding:24px 12px;text-shadow:0 1px 2px rgba(0,0,0,.3)}

/* L2 */
.l2-wrapper{display:flex;flex-direction:column;min-height:calc(100vh - 150px);justify-content:center}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:center}
.item-card{border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:transform .15s;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.item-card:active{transform:scale(.96)}
.item-card.dragging{opacity:.85;transform:scale(1.05);z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.item-card.drop-target{outline:3px dashed rgba(255,255,255,.6);outline-offset:2px}
.item-name{font-size:14px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.item-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}

/* L3 */
.qr-container{display:flex;flex-direction:column;align-items:center;padding-top:20px}
.qr-white{background:#fff;border-radius:16px;padding:16px;display:inline-block}
.qr-white canvas{display:block;max-width:82vw;max-height:58vh}
.l3-meta{text-align:center;margin-top:20px;color:#888;font-size:14px}
.l3-actions{display:flex;gap:12px;margin-top:20px;width:100%;max-width:340px}
.btn-outline{flex:1;padding:12px;background:transparent;border:1px solid #444;border-radius:10px;color:#ccc;font-size:14px;cursor:pointer;text-align:center;transition:border-color .2s}
.btn-outline:active{border-color:#7c8aff}
.btn-danger{flex:1;padding:12px;background:transparent;border:1px solid #5a1a1a;border-radius:10px;color:#e74c3c;font-size:14px;cursor:pointer;text-align:center}

/* Floating buttons */
.float-btn{border-radius:50%;background:#2a2a4a;border:1px solid #3a3a5a;color:#aaa;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);transition:all .2s}
.float-btn:active{background:#3a3a5a;transform:scale(.95)}
.settings-btn{position:fixed;bottom:24px;right:24px;width:48px;height:48px;font-size:22px}
.add-btn{position:fixed;bottom:24px;left:24px;width:48px;height:48px;font-size:28px;display:none}
.add-btn.visible{display:flex}

/* Settings modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:150;overflow-y:auto}
.modal-overlay.open{display:block}
.modal-content{background:#1a1a2e;margin:20px;border-radius:16px;padding:20px;min-height:calc(100vh - 40px)}
.modal-header{display:flex;align-items:center;margin-bottom:16px}
.modal-header h2{flex:1;font-size:18px}
.modal-close-btn{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:8px}
.section-title{font-size:13px;color:#666;letter-spacing:1px;margin:20px 0 8px}
.settings-list{}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 12px;background:#1a1a2e;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.settings-item:active{background:#252540}
.settings-item .si-name{font-size:15px;color:#e0e0e0}
.settings-item .si-meta{font-size:12px;color:#666}
.settings-item .si-arrow{color:#555;font-size:16px}

/* Settings - item editor */
.editor-label{font-size:12px;color:#888;margin:12px 0 4px}
.editor-input{width:100%;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:10px;color:#e0e0e0;font-size:15px;outline:none;margin-bottom:4px}
.editor-input:focus{border-color:#7c8aff}
.editor-textarea{width:100%;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:10px;color:#e0e0e0;font-size:14px;min-height:140px;resize:vertical;outline:none;line-height:1.6}
.editor-textarea:focus{border-color:#7c8aff}

.btn{padding:10px 0;background:#7c8aff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;display:block;width:100%}
.btn:active{opacity:.8}
.btn-sm{padding:8px 18px;background:#7c8aff;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-sm.danger{background:#c0392b}
.btn-sm.secondary{background:#444}
.btn-sm:active{opacity:.7}

.empty-state{text-align:center;color:#555;padding:60px 20px;font-size:15px;line-height:1.8}

.l3-privacy{text-align:center;margin-top:16px;color:#555;font-size:12px;line-height:1.6;max-width:300px;white-space:pre-line}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#7c8aff;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Temp input section */
.temp-section{padding:0 0 16px 0}
.temp-label{font-size:13px;color:#666;letter-spacing:1px;margin-bottom:10px}
.temp-buttons{display:flex;gap:12px}
.temp-btn{flex:1;border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:transform .15s;border:none;background:#1e1e3a;color:#ccc;font-size:13px;font-weight:600}
.temp-btn:active{transform:scale(.96)}
.temp-btn-icon{font-size:32px;display:block;margin-bottom:6px}

/* OCR preview & iOS Live Text hint */
.ocr-preview{width:100%;max-height:500px;object-fit:contain;border-radius:12px;margin-bottom:12px;display:none;background:#000}
.ocr-hint{text-align:center;color:#888;font-size:13px;line-height:1.7;padding:8px 16px;margin-bottom:8px;background:#1a1a2e;border-radius:10px}
.ocr-hint-steps{display:flex;flex-direction:column;gap:6px;text-align:left}
.ocr-step{display:flex;align-items:center;gap:8px;color:#ccc;font-size:14px}
.ocr-step-num{width:22px;height:22px;border-radius:50%;background:#7c8aff;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Voice recording */
.voice-control{display:flex;flex-direction:column;align-items:center;padding:30px 0}
.voice-btn{width:80px;height:80px;border-radius:50%;border:3px solid #444;background:#1e1e3a;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;transition:all .2s}
.voice-btn.recording{border-color:#e74c3c;box-shadow:0 0 0 8px rgba(231,76,60,.2)}
.voice-pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}70%{box-shadow:0 0 0 16px rgba(231,76,60,0)}100%{box-shadow:0 0 0 0 rgba(231,76,60,0)}}
.voice-status{color:#888;font-size:13px;margin-top:14px}

/* Text editor (shared by OCR & voice) */
.temp-editor{width:100%;min-height:120px;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:12px;color:#e0e0e0;font-size:14px;resize:vertical;outline:none;line-height:1.7;margin-bottom:12px}
.temp-editor:focus{border-color:#7c8aff}
.temp-actions{display:flex;gap:12px}
.temp-actions .btn{flex:1}

/* Split QR nav */
.split-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
.split-nav-btn{width:40px;height:40px;border-radius:50%;background:#2a2a4a;border:1px solid #3a3a5a;color:#ccc;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.split-nav-btn:disabled{opacity:.3}
.split-indicator{color:#888;font-size:14px;min-width:60px;text-align:center}

/* PIN Lock */
.pin-overlay{position:fixed;inset:0;background:#0f0f1a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.pin-overlay.hidden{display:none}
.pin-title{font-size:20px;font-weight:600;margin-bottom:8px;color:#fff}
.pin-subtitle{font-size:13px;color:#888;margin-bottom:24px;text-align:center;line-height:1.6}
.pin-dots{display:flex;gap:16px;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #4a4a7a;transition:background .15s}
.pin-dot.filled{background:#7b6cf6;border-color:#7b6cf6}
.pin-dot.error{background:#e05555;border-color:#e05555;animation:pinShake .4s}
@keyframes pinShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);grid-template-rows:repeat(4,56px);gap:10px}
.pin-key{background:#1a1a2e;border:1px solid #3a3a5a;border-radius:12px;color:#e0e0e0;font-size:22px;cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:#2a2a5a}
.pin-key.del{font-size:14px;color:#888}
.pin-key.empty{visibility:hidden}
.pin-reset{background:none;border:none;color:#666;font-size:12px;margin-top:20px;cursor:pointer;text-decoration:underline}
.pin-reset:hover{color:#e05555}
.pin-error{color:#e05555;font-size:13px;margin-bottom:12px;min-height:20px}
</style>
</head>
<body>

<!-- PIN Lock overlay -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-title" id="pinTitle">输入应用密码</div>
  <div class="pin-subtitle" id="pinSubtitle">请输入4位数字密码以解锁应用</div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" data-key="1">1</button>
    <button class="pin-key" data-key="2">2</button>
    <button class="pin-key" data-key="3">3</button>
    <button class="pin-key" data-key="4">4</button>
    <button class="pin-key" data-key="5">5</button>
    <button class="pin-key" data-key="6">6</button>
    <button class="pin-key" data-key="7">7</button>
    <button class="pin-key" data-key="8">8</button>
    <button class="pin-key" data-key="9">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" data-key="0">0</button>
    <button class="pin-key del" data-key="del">&#x232B;</button>
  </div>
  <button class="pin-reset" id="pinReset" style="display:none">忘记密码？(重置将清除全部数据)</button>
</div>

<div class="nav" id="nav">
  <button class="nav-back" id="navBack">&#x2039;</button>
  <div class="nav-title" id="navTitle">QR 文本库</div>
</div>

<!-- L1 -->
<div class="page active" id="page-l1">
  <div class="temp-section">
    <div class="temp-label">临时输入</div>
    <div class="temp-buttons">
      <button class="temp-btn" id="btnOcr"><span class="temp-btn-icon">&#x1F4F7;</span>拍照识别</button>
      <button class="temp-btn" id="btnVoice"><span class="temp-btn-icon">&#x1F3A4;</span>语音输入</button>
    </div>
  </div>
  <div class="temp-label">常用模板</div>
  <div class="cat-grid" id="catGrid"></div>
  <div class="empty-state" id="l1Empty" style="display:none">还没有分类<br>点击右下角 &#x2699; → 载入预设模板</div>
</div>

<!-- L2 -->
<div class="page" id="page-l2">
  <div class="l2-wrapper"><div class="item-grid" id="itemGrid"></div></div>
</div>

<!-- L3 -->
<div class="page" id="page-l3">
  <div class="qr-container">
    <div class="qr-white" id="qrWhite"></div>
    <div class="l3-meta" id="l3Meta"></div>
    <div class="l3-actions">
      <button class="btn-outline" id="editItemBtn">编辑文本</button>
      <button class="btn-outline" id="moveItemBtn">移动至其他分类</button>
      <button class="btn-danger" id="deleteItemBtn">删除</button>
    </div>
    <div class="l3-privacy" id="l3PrivacyHint"></div>
  </div>
</div>

<!-- Disclaimer modal -->
<div class="modal-overlay" id="disclaimerModal">
  <div class="modal-content" style="display:flex;flex-direction:column;justify-content:center;text-align:center">
    <h2 style="font-size:18px;margin-bottom:16px">使用须知</h2>
    <p style="font-size:14px;color:#aaa;line-height:1.8;text-align:left;margin-bottom:20px">
      本工具为临床医疗文书模板管理助手，旨在协助执业医师提高电子病历录入效率。<br><br>
      <strong>请勿在模板中包含患者身份信息</strong>（姓名、病历号、身份证号等）。<br>
      模板中的占位符（<code>___</code>）应在录入电子病历后替换为实际数值。<br>
      最终病历内容须由临床医生审核确认后录入医院信息系统。<br><br>
      本软件不涉及患者隐私数据的采集、传输或云端存储，所有数据仅保存在您的设备本地。
    </p>
    <button class="btn" id="disclaimerAccept">已知悉并同意</button>
  </div>
</div>

<!-- Temp OCR page — iOS Live Text primary -->
<div class="page" id="page-temp-ocr">
  <input type="file" id="ocrFileInput" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="ocrLibraryInput" accept="image/*" style="display:none">
  <canvas class="ocr-preview" id="ocrPreview"></canvas>
  <div class="ocr-hint" id="ocrHint">
    <div class="ocr-hint-steps">
      <div class="ocr-step"><span class="ocr-step-num">1</span> 长按照片</div>
      <div class="ocr-step"><span class="ocr-step-num">2</span> 拖选文字后点「复制」</div>
      <div class="ocr-step"><span class="ocr-step-num">3</span> 点下方「粘贴」按钮</div>
    </div>
  </div>
  <textarea class="temp-editor" id="ocrEditor" placeholder="粘贴后文字将显示在此处，可编辑修改..."></textarea>
  <div class="temp-actions">
    <button class="btn" id="ocrPaste" style="background:#3a3a5a">粘贴</button>
    <button class="btn" id="ocrRetake" style="background:#3a3a5a">重拍</button>
    <button class="btn" id="ocrLibrary" style="background:#3a3a5a">相册</button>
    <button class="btn" id="ocrGenerate" style="background:#7c8aff">生成二维码</button>
  </div>
</div>

<!-- Temp voice page -->
<div class="page" id="page-temp-voice">
  <div class="voice-control">
    <button class="voice-btn" id="voiceBtn">&#x1F3A4;</button>
    <div class="voice-status" id="voiceStatus">点击开始录音</div>
  </div>
  <textarea class="temp-editor" id="voiceEditor" placeholder="语音识别结果将显示在此处，可直接编辑修改..."></textarea>
  <div class="temp-actions">
    <button class="btn" id="voiceClear">清除重录</button>
    <button class="btn" id="voiceGenerate" style="background:#7c8aff">生成二维码</button>
  </div>
</div>

<!-- Temp QR result page -->
<div class="page" id="page-temp-qr">
  <div class="qr-container">
    <div class="qr-white" id="tempQrWhite"></div>
    <div class="l3-meta" id="tempQrMeta"></div>
    <div class="split-nav" id="splitNav" style="display:none">
      <button class="split-nav-btn" id="splitPrev">&#x25C0;</button>
      <span class="split-indicator" id="splitIndicator"></span>
      <button class="split-nav-btn" id="splitNext">&#x25B6;</button>
    </div>
    <div class="l3-actions">
      <button class="btn-outline" id="tempSaveBtn">保存为模板</button>
    </div>
    <div class="l3-privacy" id="tempQrHint"></div>
  </div>
</div>

<button class="float-btn settings-btn" id="settingsBtn">&#x2699;</button>
<button class="float-btn add-btn" id="addBtn">+</button>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content" id="settingsContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'qrlib_v25';
var RECENT_KEY = 'qrlib_v25_recent';
var PIN_KEY = 'qrlib_v25_pin';

// ==================== PIN Lock ====================
function hashPin(pin){var h=0;for(var i=0;i<pin.length;i++){h=((h<<5)-h)+pin.charCodeAt(i);h|=0}return h.toString(36)}

function hasPin(){return !!localStorage.getItem(PIN_KEY)}

function setupPin(pin){
  var ph=hashPin(pin);
  localStorage.setItem(PIN_KEY,ph);
  var s=Date.now().toString(36);
  sessionStorage.setItem('qrlib_session',s);
}

function verifyPin(pin){
  var stored=localStorage.getItem(PIN_KEY);
  return stored===hashPin(pin);
}

function isUnlocked(){
  return !!sessionStorage.getItem('qrlib_session');
}

function resetPin(){
  localStorage.removeItem(PIN_KEY);
  sessionStorage.removeItem('qrlib_session');
  localStorage.removeItem(STORAGE_KEY);
}

function changePinStored(oldPin,newPin){
  if(!verifyPin(oldPin))return false;
  localStorage.setItem(PIN_KEY,hashPin(newPin));
  return true;
}

var pinInput='';
var pinMode='verify'; // 'verify' | 'setup' | 'confirm' | 'changeOld' | 'changeNew'
var pinSetupValue='';

function showPinOverlay(mode){
  pinMode=mode;pinInput='';pinSetupValue='';
  var ov=document.getElementById('pinOverlay');
  var title=document.getElementById('pinTitle');
  var subtitle=document.getElementById('pinSubtitle');
  var error=document.getElementById('pinError');
  var reset=document.getElementById('pinReset');
  ov.classList.remove('hidden');
  error.textContent='';
  updatePinDots();
  if(mode==='setup'){
    title.textContent='设置应用密码';subtitle.textContent='请设置4位数字密码以保护模板数据';reset.style.display='none';
  }else if(mode==='confirm'){
    title.textContent='确认应用密码';subtitle.textContent='请再次输入4位数字密码确认';reset.style.display='none';
  }else if(mode==='verify'){
    title.textContent='输入应用密码';subtitle.textContent='请输入4位数字密码以解锁应用';reset.style.display=hasPin()?'block':'none';
  }else if(mode==='changeOld'){
    title.textContent='修改密码';subtitle.textContent='请输入当前密码';reset.style.display='none';
  }else if(mode==='changeNew'){
    title.textContent='设置新密码';subtitle.textContent='请输入新的4位数字密码';reset.style.display='none';
  }
}

function hidePinOverlay(){
  document.getElementById('pinOverlay').classList.add('hidden');
}

function updatePinDots(){
  var dots=document.getElementById('pinDots').querySelectorAll('.pin-dot');
  for(var i=0;i<dots.length;i++){
    dots[i].classList.toggle('filled',i<pinInput.length);
    dots[i].classList.remove('error');
  }
}

function shakePinDots(){
  var dots=document.getElementById('pinDots').querySelectorAll('.pin-dot');
  dots.forEach(function(d){d.classList.add('error')});
  setTimeout(function(){dots.forEach(function(d){d.classList.remove('error')});updatePinDots()},400);
}

function handlePinInput(key){
  if(key==='del'){
    if(pinInput.length>0)pinInput=pinInput.slice(0,-1);
    updatePinDots();
    return;
  }
  if(pinInput.length>=4)return;
  pinInput+=key;
  updatePinDots();
  if(pinInput.length===4){
    setTimeout(function(){processPin()},150);
  }
}

function processPin(){
  var error=document.getElementById('pinError');
  if(pinMode==='setup'){
    pinSetupValue=pinInput;pinInput='';
    updatePinDots();
    showPinOverlay('confirm');
  }else if(pinMode==='confirm'){
    if(pinInput===pinSetupValue){
      setupPin(pinInput);
      hidePinOverlay();
      initApp();
    }else{
      error.textContent='两次输入的密码不一致，请重新设置';
      pinInput='';pinSetupValue='';
      updatePinDots();
      showPinOverlay('setup');
    }
  }else if(pinMode==='verify'){
    if(verifyPin(pinInput)){
      var s=Date.now().toString(36);
      sessionStorage.setItem('qrlib_session',s);
      hidePinOverlay();
      initApp();
    }else{
      error.textContent='密码错误，请重试';
      pinInput='';
      shakePinDots();
    }
  }else if(pinMode==='changeOld'){
    if(verifyPin(pinInput)){
      pinInput='';
      updatePinDots();
      showPinOverlay('changeNew');
    }else{
      error.textContent='当前密码错误';
      pinInput='';
      shakePinDots();
    }
  }else if(pinMode==='changeNew'){
    pinSetupValue=pinInput;pinInput='';
    updatePinDots();
    // Confirm new PIN
    pinMode='changeNewConfirm';
    document.getElementById('pinTitle').textContent='确认新密码';
    document.getElementById('pinSubtitle').textContent='请再次输入新密码确认';
  }else if(pinMode==='changeNewConfirm'){
    if(pinInput===pinSetupValue){
      localStorage.setItem(PIN_KEY,hashPin(pinInput));
      hidePinOverlay();
      toast('密码已修改');
    }else{
      document.getElementById('pinError').textContent='两次输入的密码不一致';
      pinInput='';pinSetupValue='';
      updatePinDots();
      pinMode='changeNew';
      document.getElementById('pinTitle').textContent='设置新密码';
      document.getElementById('pinSubtitle').textContent='请输入新的4位数字密码';
    }
  }
}

// Wire up PIN pad
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.pin-key').forEach(function(btn){
    btn.addEventListener('click',function(){
      handlePinInput(btn.getAttribute('data-key'));
    });
  });
  document.getElementById('pinReset').addEventListener('click',function(){
    if(confirm('重置密码将清除应用内全部数据（模板、分类等）。此操作不可撤销。\n\n建议先导出数据备份（JSON导出）。\n\n确定要重置吗？')){
      resetPin();
      pinInput='';pinSetupValue='';
      updatePinDots();
      showPinOverlay('setup');
      toast('数据已清除，请设置新密码');
    }
  });

  // Check PIN on startup
  if(!hasPin()){
    showPinOverlay('setup');
  }else if(!isUnlocked()){
    showPinOverlay('verify');
  }else{
    hidePinOverlay();
    initApp();
  }
});

// Called after PIN is verified or when already unlocked
function initApp(){
  hidePinOverlay();
  // App init happens via the existing flow below
}

// Keyboard support for PIN
document.addEventListener('keydown',function(e){
  var ov=document.getElementById('pinOverlay');
  if(ov.classList.contains('hidden'))return;
  if(e.key>='0'&&e.key<='9'){handlePinInput(e.key)}
  else if(e.key==='Backspace'||e.key==='Delete'){handlePinInput('del')}
  else if(e.key==='Enter'&&pinInput.length===4){processPin()}
});

// ==================== Data ====================
function load(){
  try{var d=JSON.parse(localStorage.getItem(STORAGE_KEY));if(d&&d.categories)return d}catch(e){}
  return {categories:[]};
}
function save(data){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
function sortCats(data){data.categories.sort(function(a,b){return a.order-b.order})}
function findCat(id){var d=load();for(var i=0;i<d.categories.length;i++){if(d.categories[i].id===id)return d.categories[i]}return null}
function findItem(cat,id){for(var i=0;i<cat.items.length;i++){if(cat.items[i].id===id)return cat.items[i]}return null}

// ==================== Colors ====================
function catColor(index,total){var hue=(index*Math.floor(360/(total||1)))%360;return 'hsl('+hue+',58%,48%)'}
function itemColor(catHue,index,total){var hue=(catHue+index*Math.floor(360/(total||1)*0.4))%360;return 'hsl('+hue+',40%,42%)'}

// ==================== Toast ====================
var toastTimer;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show')},1800)}

// ==================== QR ====================
function genQR(text,size,cb){if(typeof QRCode==='undefined'){cb(null);return}var c=document.createElement('canvas');QRCode.toCanvas(c,text,{width:size||300,margin:2,color:{dark:'#000',light:'#fff'}},function(err){cb(err?null:c)})}

// ==================== L1: Categories ====================

  catGrid.innerHTML='';
  if(data.categories.length===0){l1Empty.style.display='block';addBtn.classList.add('visible');return}
  l1Empty.style.display='none';
  data.categories.forEach(function(cat,i){
    var card=document.createElement('div');

    card.style.backgroundColor=catColor(i,data.categories.length);
    card.setAttribute('data-cid',cat.id);

    card.addEventListener('click',function(e){if(card.classList.contains('dragging'))return;currentCatId=cat.id;renderL2(cat.id);goTo(pageL2,cat.name,true);addBtn.classList.add('visible');isSearchMode=false});
    var lp;card.addEventListener('touchstart',function(e){lp=setTimeout(function(){startDrag(card,cat.id,e)},500)},{passive:false});card.addEventListener('touchend',function(){clearTimeout(lp)});card.addEventListener('touchmove',function(){clearTimeout(lp)});

// Drag-to-swap
var dragCard=null,dragCatId=null,dragItemId=null,dragItemCatId=null,ghost=null,offsetX=0,offsetY=0;
function startDrag(card,catId,e,itemId){dragCard=card;dragCatId=catId;dragItemId=itemId||null;dragItemCatId=itemId?catId:null;card.classList.add('dragging');ghost=document.createElement('div');ghost.className='ghost';ghost.style.width=card.offsetWidth+'px';ghost.style.height=card.offsetHeight+'px';ghost.style.backgroundColor=card.style.backgroundColor;ghost.innerHTML=card.innerHTML;document.body.appendChild(ghost);var t=e.touches[0];var r=card.getBoundingClientRect();offsetX=t.clientX-r.left;offsetY=t.clientY-r.top;moveGhost(t.clientX,t.clientY)}
function moveGhost(x,y){if(!ghost)return;ghost.style.left=(x-offsetX)+'px';ghost.style.top=(y-offsetY)+'px'}
document.addEventListener('touchmove',function(e){if(!dragCard)return;e.preventDefault();var t=e.touches[0];moveGhost(t.clientX,t.clientY);var isItem=dragCard.classList.contains('item-card');var sel=isItem?'.item-card':'.cat-card';document.querySelectorAll(sel).forEach(function(c){c.classList.remove('drop-target');if(c===dragCard)return;var r=c.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){c.classList.add('drop-target')}})},{passive:false});
document.addEventListener('touchend',function(){if(!dragCard)return;var isItem=dragCard.classList.contains('item-card');var sel=isItem?'.item-card':'.cat-card';var t=document.querySelector(sel+'.drop-target');if(t){if(isItem){var tid=t.getAttribute('data-iid');swapItems(dragItemCatId,dragItemId,tid)}else{var tid=t.getAttribute('data-cid');swapCategories(dragCatId,tid)}}dragCard.classList.remove('dragging');document.querySelectorAll(sel).forEach(function(c){c.classList.remove('drop-target')});if(ghost){ghost.remove();ghost=null}dragCard=null;dragCatId=null;dragItemId=null;dragItemCatId=null});
function swapCategories(id1,id2){var d=load();var c1=d.categories.find(function(c){return c.id===id1});var c2=d.categories.find(function(c){return c.id===id2});if(!c1||!c2)return;var t=c1.order;c1.order=c2.order;c2.order=t;save(d);renderL1()}
function swapItems(catId,id1,id2){var d=load();var cat=d.categories.find(function(c){return c.id===catId});if(!cat)return;var i1=cat.items.find(function(i){return i.id===id1});var i2=cat.items.find(function(i){return i.id===id2});if(!i1||!i2)return;var t=i1.order;i1.order=i2.order;i2.order=t;save(d);renderL2(catId)}
function showCatPicker(callback,excludeCatId){
  var data=load();
  var h='<div class="modal-header"><h2>选择分类</h2><button class="modal-close-btn" id="cpClose">&times;</button></div>';
  data.categories.forEach(function(cat){if(cat.id!==excludeCatId)h+='<div class="settings-item" id="cpick-'+cat.id+'" style="cursor:pointer"><span>'+escHtml(cat.name)+'</span><span style="color:#888;font-size:12px">'+(cat.items?cat.items.length:0)+' 项</span></div>'});
  if(data.categories.filter(function(c){return c.id!==excludeCatId}).length===0)h+='<p style="color:#888;text-align:center;padding:20px">暂无其他分类</p>';
  h+='<button class="btn-sm" id="cpNewCat" style="width:100%;margin-top:8px">+ 新建分类</button>';
  document.getElementById('settingsContent').innerHTML=h;
  document.getElementById('settingsModal').classList.add('open');
  document.getElementById('cpClose').onclick=function(){document.getElementById('settingsModal').classList.remove('open')};
  data.categories.forEach(function(cat){if(cat.id!==excludeCatId)document.getElementById('cpick-'+cat.id).onclick=function(){document.getElementById('settingsModal').classList.remove('open');callback(cat.id)}});
  document.getElementById('cpNewCat').onclick=function(){
    var name=prompt('输入新分类名称');
    if(!name||!name.trim())return;
    var d=load();
    d.categories.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name.trim(),order:d.categories.length,items:[]});
    save(d);renderL1();
    document.getElementById('settingsModal').classList.remove('open');
    callback(d.categories[d.categories.length-1].id);
  }
}
function moveItemToCategory(srcCatId,itemId,tgtCatId){
  var d=load();
  var src=d.categories.find(function(c){return c.id===srcCatId});
  var tgt=d.categories.find(function(c){return c.id===tgtCatId});
  if(!src||!tgt||srcCatId===tgtCatId)return;
  var idx=src.items.findIndex(function(i){return i.id===itemId});
  if(idx<0){toast('项目不存在');return}
  var item=src.items.splice(idx,1)[0];
  item.order=tgt.items.length;
  tgt.items.push(item);save(d);
  renderL2(srcCatId);
  currentCatId=tgtCatId;
  renderL2(tgtCatId);goTo(pageL2,tgt.name,true);addBtn.classList.add('visible');
  toast('已移动至: '+tgt.name);
}

// ==================== L2: Items ====================
function renderL2(catId){
  var cat=findCat(catId);if(!cat)return;
  cat.items.sort(function(a,b){return a.order-b.order});
  itemGrid.innerHTML='';
  // Single item: 1 column centered; multiple: 2 columns
  itemGrid.style.gridTemplateColumns=cat.items.length===1?'1fr':'1fr 1fr';
  itemGrid.style.maxWidth=cat.items.length===1?'200px':'';itemGrid.style.margin=cat.items.length===1?'0 auto':'';
  var data=load();var catIdx=data.categories.findIndex(function(c){return c.id===catId});
  if(catIdx<0)catIdx=0;
  var catHue=catIdx*Math.floor(360/Math.max(data.categories.length,1));

  cat.items.forEach(function(item,i){
    var card=document.createElement('div');
    card.className='item-card';
    card.style.backgroundColor=itemColor(catHue,i,cat.items.length);
    card.innerHTML='<div class="item-name">'+escHtml(item.name)+'</div><div class="item-meta">'+(item.text?item.text.length:0)+' 字</div>';
    card.setAttribute('data-iid',item.id);
    card.setAttribute('data-cid',catId);

    // Tap + long-press drag
    var touchStartTime=0,touchMoved=false;
    var lp;
    card.addEventListener('touchstart',function(e){touchStartTime=Date.now();touchMoved=false;lp=setTimeout(function(){startDrag(card,catId,e,item.id)},500)},{passive:false});
    card.addEventListener('touchend',function(){clearTimeout(lp);if(!touchMoved&&Date.now()-touchStartTime<400&&!card.classList.contains('dragging')){currentItemId=item.id;renderL3(catId,item.id);goTo(pageL3,item.name,true)}});
    card.addEventListener('touchmove',function(){clearTimeout(lp);touchMoved=true});
    itemGrid.appendChild(card);
  });

  // "+" button: create new item
  addBtn.onclick=function(){showItemEditor(catId,null)};
}

// ==================== L3: QR Detail ====================
function renderL3(catId,itemId){
  var cat=findCat(catId);var item=findItem(cat,itemId);if(!item)return;
  document.getElementById('qrWhite').innerHTML='';
  document.getElementById('l3Meta').textContent=item.text.length+' 字';
  document.getElementById('l3PrivacyHint').textContent='此二维码含医疗文本，使用后请关闭页面\n请确认模板中的占位符已替换为实际数值后再录入';
  genQR(item.text,Math.min(window.innerWidth*0.8,500),function(c){if(c)document.getElementById('qrWhite').appendChild(c)});
  document.getElementById('editItemBtn').onclick=function(){showItemEditor(catId,itemId)};
  document.getElementById('moveItemBtn').onclick=function(){showCatPicker(function(tgtCatId){moveItemToCategory(catId,itemId,tgtCatId)},catId)};
  document.getElementById('deleteItemBtn').onclick=function(){
    if(!confirm('确定删除'+item.name+'？'))return;
    cat.items=cat.items.filter(function(i){return i.id!==itemId});
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});if(ci>=0)d.categories[ci]=cat;save(d);
    renderL2(catId);goTo(pageL2,cat.name,true);addBtn.classList.add('visible');toast('已删除');
  };
}

// ==================== Item Editor (inline modal) ====================
function showItemEditor(catId,itemId,prefillText){
  var cat=findCat(catId);var item=itemId?findItem(cat,itemId):null;
  var isNew=!item;
  var title=isNew?'新增子类':'编辑: '+(item?item.name:'');

  var h='<div class="modal-header"><h2>'+escHtml(title)+'</h2><button class="modal-close-btn" id="editorClose">&times;</button></div>';
  h+='<div class="editor-label">名称</div>';
  h+='<input type="text" class="editor-input" id="editorName" value="'+escHtml(item?item.name:'')+'" placeholder="子类名称">';
  h+='<div class="editor-label">文本内容</div>';
  h+='<textarea class="editor-textarea" id="editorText" placeholder="输入文本内容...">'+escHtml(item?item.text:(prefillText||''))+'</textarea>';
  h+='<div style="margin-top:16px"><button class="btn" id="editorSave">保存</button></div>';
  if(!isNew){h+='<div style="margin-top:8px"><button class="btn-sm danger" id="editorDeleteItem" style="width:100%">删除此子类</button></div>'}

  document.getElementById('settingsContent').innerHTML=h;
  document.getElementById('settingsModal').classList.add('open');

  document.getElementById('editorClose').onclick=function(){document.getElementById('settingsModal').classList.remove('open')};
  document.getElementById('editorSave').onclick=function(){
    var name=document.getElementById('editorName').value.trim();
    var text=document.getElementById('editorText').value.trim();
    if(!name){toast('请输入名称');return}
    if(!text){toast('请输入文本内容');return}
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});
    // Check for duplicate names in same category
    if(d.categories[ci]){
      var isDup=false;
      d.categories[ci].items.forEach(function(it){
        if(it.name===name && (isNew || it.id!==itemId)){isDup=true;}
      });
      if(isDup){toast('该分类下已存在同名子类「'+name+'」，请修改名称');return}
    }
    if(ci<0){toast('分类不存在');return}
    if(isNew){
      d.categories[ci].items.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name,text:text,order:d.categories[ci].items.length});
      currentCatId=catId;
    }else{
      var it=findItem(d.categories[ci],itemId);if(it){it.name=name;it.text=text}
    }
    save(d);
    document.getElementById('settingsModal').classList.remove('open');
    renderL2(catId);
    if(pageL1.classList.contains('active')){renderL1();goTo(pageL1,'QR 文本库',false);addBtn.classList.add('visible')}
    else if(!pageL2.classList.contains('active')){goTo(pageL2,d.categories[ci].name,true);addBtn.classList.add('visible');isSearchMode=false}
    toast(isNew?'已添加: '+name:'已更新');
  };
  if(!isNew){document.getElementById('editorDeleteItem').onclick=function(){
    if(!confirm('确定删除此子类？'))return;
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});if(ci<0)return;
    d.categories[ci].items=d.categories[ci].items.filter(function(i){return i.id!==itemId});save(d);
    document.getElementById('settingsModal').classList.remove('open');renderL2(catId);
    if(pageL3.classList.contains('active')){goTo(pageL2,d.categories[ci].name,true);addBtn.classList.add('visible')}
    toast('已删除');
  }}
}

settingsModal.addEventListener('click',function(e){if(e.target===settingsModal)settingsModal.classList.remove('open')});

  h+='<div class="section-title">手动导入导出</div>';
  h+='<button class="btn-sm secondary" id="exportBtn" style="width:100%;margin-bottom:4px">导出（显示JSON）</button>';
  h+='<div id="exportArea" style="display:none;margin-bottom:8px"><textarea id="exportText" style="width:100%;height:120px;background:#0f0f1a;border:1px solid #333;border-radius:8px;color:#aaa;font-size:11px;padding:8px;resize:none" readonly></textarea><button class="btn-sm" id="copyExportBtn" style="width:100%;margin-top:4px">复制到剪贴板</button></div>';

  h+='<div class="section-title">数据安全</div>';
  if(hasPin()){
    h+='<button class="btn-sm secondary" id="changePinBtn" style="width:100%;margin-bottom:4px">修改应用密码</button>';
  }else{
    h+='<button class="btn-sm secondary" id="setupPinBtn" style="width:100%;margin-bottom:4px">设置应用密码</button>';
  }

  h+='<div style="font-size:11px;color:#555;margin-top:4px">删除所有分类和子类数据，无法恢复</div>';

  settingsContent.innerHTML=h;

  });

  };
  document.getElementById('doImportBtn').onclick=function(){
    var txt=document.getElementById('importText').value.trim();if(!txt){toast('请粘贴JSON') ;return}
    try{var d=JSON.parse(txt);if(!d.categories)throw new Error();var existing=load();existing.categories=existing.categories.concat(d.categories);save(existing);renderL1();openSettings();toast('已导入 '+d.categories.length+' 个分类')}catch(e){toast('JSON格式无效')}
  };
  document.getElementById('clearAllDataBtn').onclick=function(){
    if(!confirm('确定清除全部数据？\n\n此操作将删除所有分类和子类数据，且无法恢复。建议先导出一份 JSON 备份。'))return;
    save({categories:[]});renderL1();openSettings();toast('已清除全部数据');
  };

  // PIN management buttons
  if(hasPin()){
    document.getElementById('changePinBtn').onclick=function(){
      settingsModal.classList.remove('open');
      showPinOverlay('changeOld');
    };
  }else{
    document.getElementById('setupPinBtn').onclick=function(){
      settingsModal.classList.remove('open');
      showPinOverlay('setup');
    };
  }

  settingsModal.classList.add('open');
}

// ==================== Settings: Cat items editor ====================
function showCatItemsEditor(catId){
  var cat=findCat(catId);if(!cat)return;
  var h='<div class="modal-header"><button class="modal-close-btn" id="catItemsBack" style="font-size:18px">&#x2039; 返回</button><h2 style="text-align:center">'+escHtml(cat.name)+'</h2><div style="width:30px"></div></div>';

  h+='<div class="editor-label">分类名称</div>';
  h+='<input type="text" class="editor-input" id="catNameEdit" value="'+escHtml(cat.name)+'">';

  h+='<div class="editor-label">子类列表</div>';
  cat.items.sort(function(a,b){return a.order-b.order}).forEach(function(item){
    h+='<div class="settings-item item-edit-row" data-iid="'+item.id+'" style="flex-wrap:wrap">';
    h+='<span class="si-name" style="width:100%">'+escHtml(item.name)+'</span>';
    h+='<span class="si-meta">'+item.text.length+' 字 — 点击编辑</span>';
    h+='</div>';
  });

  h+='<button class="btn-sm secondary" id="addItemInSettings" style="width:100%;margin-top:8px">+ 新增子类</button>';
  h+='<button class="btn-sm danger" id="delCatInSettings" style="width:100%;margin-top:8px">删除整个分类</button>';

  document.getElementById('settingsContent').innerHTML=h;

  document.getElementById('catItemsBack').onclick=function(){openSettings()};

  // Tap item → open editor
  document.querySelectorAll('.item-edit-row').forEach(function(el){
    el.addEventListener('click',function(){showItemEditor(catId,el.dataset.iid)});
  });

  // Add new item
  document.getElementById('addItemInSettings').onclick=function(){showItemEditor(catId,null)};

  // Rename category on blur
  document.getElementById('catNameEdit').addEventListener('change',function(){
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});if(ci>=0){d.categories[ci].name=this.value.trim()||d.categories[ci].name;save(d);renderL1()}
  });

  // Delete category
  document.getElementById('delCatInSettings').onclick=function(){
    if(!confirm('确定删除「'+cat.name+'」及所有 '+cat.items.length+' 个子类？'))return;
    var d=load();d.categories=d.categories.filter(function(c){return c.id!==catId});save(d);renderL1();openSettings();toast('已删除: '+cat.name);
  };
}

    {id:'c3-2',name:'可手术-病理评估',text:'病理科况丽平主任医师：食管活检病理提示：鳞状细胞癌。细胞具异型性，明确恶性肿瘤诊断。后续待手术切除标本送检后，进一步明确浸润深度、淋巴结转移情况及切缘状态。',order:1},
    {id:'c3-3',name:'可手术-放疗评估',text:'肿瘤放疗科罗何三副主任医师：结合影像分期与相关指南，该患者肿瘤评估为可切除局部病变，目前暂无明确的放疗绝对指征，同意首选外科手术治疗。若术后病理提示切缘阳性或淋巴结转移，再行评估术后辅助放疗。如患者无手术意愿，可考虑行放射治疗。',order:2},
    {id:'c3-4',name:'可手术-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前身体机能状态良好（ECOG 0-1分），影像学未见远处系统性转移。目前暂不考虑一线全身系统性化疗、免疫或靶向治疗，术后根据病理分期及高危因素，决定是否行辅助化疗或免疫维持治疗。',order:3},
    {id:'c3-5',name:'可手术-麻醉评估',text:'麻醉科詹银周副主任医师：患者各项常规术前检查未见显著绝对异常，心肺储备功能尚可，无麻醉绝对禁忌证，可耐受全麻及胸腹联合手术，术中将密切监测循环及呼吸功能。',order:4},
    {id:'c3-6',name:'可手术-MDT总结',text:'傅俊惠主任医师：综合各科室意见，患者食管癌诊断明确，影像分期提示局部可切除，无远处转移，全身各主要器官功能良好，无明显手术及麻醉禁忌。结合患方有手术意愿，诊疗计划如下：拟行机器人辅助食管癌根治术（McKeown术式），术后根据大病理结果指导下一步综合治疗。',order:5},
    {id:'c3-7',name:'非手术-影像学评估',text:'影像科杜光舟副主任医师：影像学提示食管病变范围较长，局部管壁显著增厚，与周边组织（如气管/主动脉）界限不显，或伴纵隔/腹腔多发融合肿大淋巴结。解剖分期相对较晚，暂不推荐直接行根治性手术切除，建议先行全身系统治疗以争取降期机会。',order:6},
    {id:'c3-8',name:'非手术-病理评估',text:'病理科况丽平主任医师：食管活检病理明确为鳞状细胞癌。细胞异型性明显，恶性度高。如临床拟行化疗联合免疫治疗，可加做PD-L1（CPS/TPS）等免疫相关标志物检测，以评估免疫治疗获益敏感度，指导精准用药。',order:7},
    {id:'c3-9',name:'非手术-放疗评估',text:'肿瘤放疗科罗何三副主任医师：评估患者目前处于局部晚期阶段，直接手术难度大、风险高且R0切除率低。鉴于患者目前无明显局部梗阻或穿孔高危征象，赞同首选全身系统性化疗联合免疫治疗进行新辅助/转化治疗，暂不急于介入局部放疗。',order:8},
    {id:'c3-10',name:'非手术-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前身体机能良好（ECOG 0-1分），能耐受系统药物治疗。化疗联合PD-1抑制剂对于局部晚期食管癌具有良好的降期和病理完全缓解（pCR）率。建议采用___（具体化免方案）行2-4周期治疗。',order:9},
    {id:'c3-11',name:'非手术-MDT总结',text:'傅俊惠主任医师：综合各科意见，该患者诊断为食管局部晚期恶性肿瘤，目前直接行外科手术难度大、R0切除率低。为使患者最大程度获益，诊疗计划如下：暂缓直接手术，拟行“化疗+免疫治疗”作为新辅助/转化治疗。计划治疗2-4周期后重新复查影像学，动态评估肿瘤降期及缓解情况，若达到手术标准，则择期行胸腹腔镜联合食管癌根治术。',order:10}
  ]},
  {id:'c4',name:'MDT-结肠癌',order:3,items:[
    {id:'c4-1',name:'手术-影像学评估',text:'影像科杜光舟副主任医师：影像学提示___结肠占位，局部肠管管腔狭窄，近端肠管伴有不同程度积气积液（提示潜在梗阻/无明显梗阻）。病变浸润局限于局部，肠周/肠系膜可见肿大淋巴结，腹腔未见明确融合肿大淋巴结，肝、肺等远处器官未见系统性转移迹象。解剖评估具备外科手术切除条件。',order:0},
    {id:'c4-2',name:'手术-病理评估',text:'病理科况丽平主任医师：结肠活检病理提示：结肠腺癌，明确恶性肿瘤诊断。鉴于结肠癌诊疗规范，建议术后大病理加做错配修复蛋白（MMR/MSI状态）及RAS/BRAF基因检测，以指导术后分期及辅助化疗方案选择。',order:1},
    {id:'c4-3',name:'手术-放疗评估',text:'肿瘤放疗科罗何三副主任医师：结肠癌对放射治疗敏感度较低，且肠管位置具有活动性，极易引起放射性肠炎。结合目前影像分期，该患者无任何放疗指征，赞同直接行外科手术切除。',order:2},
    {id:'c4-4',name:'手术-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前未见远处系统性转移，暂无一线全身新辅助化疗、靶向或免疫治疗指征。结肠癌直接行全身化疗可能增加肠道穿孔、出血等严重并发症的风险。支持首选外科根治性手术治疗，术后根据病理分期（如高危Ⅱ期或Ⅲ期）再决定是否行辅助化疗。',order:3},
    {id:'c4-5',name:'手术-麻醉评估',text:'麻醉科詹银周副主任医师：患者近期无明显急腹症表现，各项常规术前检查未见明显禁忌，心肺储备功能可。ASA分级评估为Ⅱ-Ⅲ级，无麻醉绝对禁忌证，可耐受全麻及腹腔镜结肠癌根治手术。',order:4},
    {id:'c4-6',name:'手术-MDT总结',text:'傅俊惠主任医师：综合各科室意见，患者结肠癌诊断明确，影像提示局部可切除、无远处转移。鉴于结肠癌具有较高的潜在梗阻、穿孔及出血风险，且无新辅助治疗指征，应尽早手术切除。结合患方有明确手术意愿，诊疗计划如下：拟行腹腔镜___结肠癌根治术。术后密切关注肠功能恢复，并根据大病理结果指导下一步综合治疗。',order:5}
  ]},
  {id:'c5',name:'MDT-直肠癌',order:4,items:[
    {id:'c5-1',name:'手术-影像学评估',text:'影像科杜光舟副主任医师：盆腔MRI提示直肠占位，病变浸润局限于管壁内。关键评估指标示：MRF（直肠系膜筋膜）阴性，未见明确受累；EMVI（直肠系膜内血管侵犯）阴性；盆腔未见明确融合肿大淋巴结，肝肺未见远处转移。影像学分期属于中期，解剖学上具备直接行根治性切除条件。',order:0},
    {id:'c5-2',name:'手术-病理评估',text:'病理科况丽平主任医师：直肠活检病理提示：直肠腺癌，明确恶性肿瘤诊断。后续待外科根治术后，将对切缘（近端、远端及环周切缘）、淋巴结检出数目及错配修复蛋白（MMR/MSI状态）进行系统评估，以指导预后及辅助治疗。',order:1},
    {id:'c5-3',name:'手术-放疗评估',text:'肿瘤放疗科罗何三副主任医师：结合盆腔MRI评估，患者目前MRF及EMVI均为阴性，暂无术前新辅助放化疗的绝对指征，赞同首选直接外科手术；若患者无手术意愿或后续评估中发现低位病变难以保留肛门，我科可随时介入并提供根治性放疗作为替代及补充方案。',order:2},
    {id:'c5-4',name:'手术-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前未见全身远处系统性转移。鉴于外科评估可切除，支持直接行外科根治性手术治疗。术后将根据大病理的T、N分期及是否存在高危因素（如分化程度、神经侵犯等），再行评估是否需要行全量辅助化疗。',order:3},
    {id:'c5-5',name:'手术-麻醉评估',text:'麻醉科詹银周副主任医师：患者各项常规术前检查无明显禁忌。ASA分级评估为Ⅱ-Ⅲ级，无麻醉绝对禁忌证，可耐受全麻及腹腔镜下直肠癌根治术。低位直肠手术时间可能较长，术中将加强气道及循环容量管理。',order:4},
    {id:'c5-6',name:'手术-MDT总结',text:'傅俊惠主任医师：综合各科室意见，患者直肠癌诊断明确。盆腔MRI提示MRF及EMVI阴性，评估可切除，具备直接手术指征。结合患方意见，诊疗计划如下：首选直接行腹腔镜直肠癌根治术（拟行DIXON术式），术后根据大病理结果再行决定是否实施辅助综合治疗。',order:5},
    {id:'c5-7',name:'非手术-影像学评估',text:'影像科杜光舟副主任医师：盆腔高分辨率MRI提示直肠占位，病变明显向外浸润。关键评估指标示：MRF（直肠系膜筋膜）受累/阳性，EMVI（脉管侵犯）阳性，伴盆腔侧支区域多发融合肿大淋巴结。影像分期提示为局部进展期直肠癌，解剖学上直接行根治性手术切除的R0切缘无法保证，建议先行全身系统治疗以争取肿瘤退缩与保肛机会。',order:6},
    {id:'c5-8',name:'非手术-病理评估',text:'病理科况丽平主任医师：直肠活检病理明确为：直肠腺癌，细胞异型性明显。建议加做错配修复蛋白（MMR/MSI状态）检测。若提示为pMMR/MSS（错配修复完整/微卫星稳定），则支持常规新辅助方案；若为dMMR/MSI-H，则可考虑免疫治疗作为转化选择。',order:7},
    {id:'c5-9',name:'非手术-放疗评估',text:'肿瘤放疗科罗何三副主任医师：按照常规临床指南，局部进展期直肠癌首选新辅助放化疗（nCRT）。但鉴于盆腔放疗可能带来明显的肠道放射性损伤、骨髓抑制及远期肛门括约肌功能减退，考虑患者对保肛及远期生活质量的诉求强烈，暂缓局部放疗，支持全身新辅助化疗（nCT）作为起始治疗。若化疗后降期不理想，我科可随时介入行补充放疗。',order:8},
    {id:'c5-10',name:'非手术-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前身体机能状态良好（ECOG 0-1分）。新辅助化疗能达到较高肿瘤退缩率和R0切除率，且能规避放疗毒副作用，建议采用___方案规范治疗4-6周期。',order:9},
    {id:'c5-11',name:'非手术-MDT总结',text:'傅俊惠主任医师：综合各科室意见，患者局部进展期直肠癌诊断明确，MRI提示MRF/EMVI阳性，直接手术难度大、复发风险高、保肛极其困难。为实现最大程度的肿瘤降期、提高R0切除率并尽量保留肛门功能，诊疗计划如下：暂缓直接手术，拟行4-6周期的规范化新辅助化疗。治疗期间每2-3周期动态复查、评估疗效，待肿瘤降期、边界清晰后，择期行腹腔镜直肠癌根治术。',order:10}
  ]},
  {id:'c6',name:'MDT-胃癌',order:5,items:[
    {id:'c6-1',name:'非手术-影像学评估',text:'影像科杜光舟副主任医师：增强CT提示胃底贲门/体/窦部管壁显著增厚，结构僵硬，局部侵犯深达浆膜下层或外膜（T4a/T4b），或伴有胃周、腹腔干周围多发融合肿大淋巴结。影像分期提示局部晚期，直接手术难以保障R0切除，建议先行全身系统治疗以期消退淋巴结并缩小病灶。',order:0},
    {id:'c6-2',name:'非手术-病理评估',text:'病理科况丽平主任医师：胃镜活检病理明确为：胃腺癌/低分化癌/印戒细胞癌。细胞异型性明显。如需行新辅助/转化治疗，建议加做HER2、MMR/MSI状态及PD-L1表达检测，以明确是否具备靶向（如曲妥珠单抗）或免疫治疗指征，指导精准用药。',order:1},
    {id:'c6-3',name:'非手术-放疗评估',text:'肿瘤放疗科罗何三副主任医师：胃癌属于腹腔空腔脏器，且周围紧邻肝、肾、脊髓等重要器官，放射耐受量受限。根据国内外指南，局部进展期胃癌目前首选全身系统性化疗，暂无首选术前放疗的绝对指征。建议暂不介入局部放疗，支持首选全身药物治疗。',order:2},
    {id:'c6-4',name:'非手术-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前身体机能良好（ECOG 0-1分）。基于循证依据，对于局部进展期胃癌，术前给予含铂类/氟尿嘧啶类的双药或三药联合方案（如FLOT/SOX等）进行新辅助化疗，或在此基础上联合免疫治疗，能显著提高病理完全缓解（pCR）率和远期生存率。建议规范治疗2-4周期。',order:3},
    {id:'c6-5',name:'非手术-MDT总结',text:'傅俊惠主任医师：综合各科意见，该患者诊断为局部进展期胃癌，解剖分期较晚（伴明显外侵或融合淋巴结），直接手术导致R1/R2切除或非计划性扩大切除的风险高。为实现最大程度的肿瘤降期、控制微转移并提高R0切除率，诊疗计划如下：暂缓直接手术，拟行2-4周期的规范化新辅助化疗/转化治疗（必要时联合靶向或免疫治疗）。治疗期间规范评估疗效，待肿瘤降期、边界清晰后，择期行腹腔镜胃癌根治术（D2淋巴结清扫）。',order:4},
    {id:'c6-6',name:'直接手术-影像学评估',text:'影像科杜光舟副主任医师：增强CT提示胃底贲门/体/窦部占位，局部管壁增厚，病变局限于管壁内，未见明确的周围脏器（如胰腺、横结肠）受累征象；胃周及腹腔干周围未见明确相互融合的肿大淋巴结，肝、肺、腹膜等远处器官未见系统性转移迹象。影像分期提示为可切除局部病变，具备外科根治性切除的解剖学条件。',order:5},
    {id:'c6-7',name:'直接手术-病理评估',text:'病理科况丽平主任医师：胃镜活检病理明确为：胃腺癌/低分化癌/印戒细胞癌。细胞具异型性，间质浸润，明确恶性肿瘤诊断。后续待外科行根治性切除后，将对大病理标本进行精确的分期（T/N分期）、切缘状态、脉管神经浸润，以及HER2、MMR/MSI状态进行检测，以明确有无高危因素及术后辅助治疗指征。',order:6},
    {id:'c6-8',name:'直接手术-放疗评估',text:'肿瘤放疗科罗何三副主任医师：结合当前影像分期，该患者评估为初治可切除胃癌，不伴有局部固定或无法切除的晚期解剖高危因素。根据国内外胃癌诊疗规范，目前暂无术前根治性或新辅助放疗指征，同意首选外科根治性手术治疗。',order:7},
    {id:'c6-9',name:'直接手术-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前未见远处系统性转移，全身基础状况及机能状态良好（ECOG 0-1分）。根据目前的临床分期评估，暂无全身系统性新辅助化疗或转化治疗的绝对指征，支持直接行外科根治性手术。术后将根据大病理的最终分期结果，再行评估是否需要给予术后辅助化疗。',order:8},
    {id:'c6-10',name:'直接手术-麻醉评估',text:'麻醉科詹银周副主任医师：患者各项常规术前检查（心电图、胸片、肺功能、生化及凝血指标等）未见显著手术禁忌，主要脏器储备功能良好。ASA分级评估为Ⅱ-Ⅲ级，无麻醉绝对禁忌证，可耐受全麻及腹腔镜下胃癌根治术。术中将常规做好容量管理与监测。',order:9},
    {id:'c6-11',name:'直接手术-MDT总结',text:'傅俊惠主任医师：综合各科室意见，患者胃恶性肿瘤诊断明确，影像提示局部病灶可切除、无远处转移，全身各主要器官功能良好，无明显手术及麻醉禁忌。结合患方有明确手术意愿，诊疗计划如下：拟行腹腔镜胃癌根治术（全胃/远端胃/近端胃根治术，行规范化D2淋巴结清扫）。术后密切关注消化道吻合口愈合及胃肠功能恢复，并根据大病理结果指导下一步综合治疗。',order:10}
  ]},
  {id:'c7',name:'MDT-肺癌及肺结节',order:6,items:[
    {id:'c7-1',name:'肺癌手术-影像学评估',text:'影像科杜光舟副主任医师：胸部增强CT提示___占位，边缘见毛刺、分叶及胸膜牵拉征，病变局限于肺内。纵隔及两肺门未见明确肿大淋巴结，未见远处器官转移迹象。具备手术切除的解剖学条件。',order:0},
    {id:'c7-2',name:'肺癌手术-病理评估',text:'病理科况丽平主任医师：肺部活检/穿刺病理提示：肺腺癌/鳞癌（或：提示恶性肿瘤细胞，倾向原发性肺癌）。明确恶性诊断。后续待外科行根治性切除后，将进一步明确组织学分型、浸润深度、淋巴结转移情况，并常规行EGFR、ALK、ROS1等驱动基因及PD-L1表达检测，以备术后辅助治疗之需。',order:1},
    {id:'c7-3',name:'肺癌手术-放疗评估',text:'肿瘤放疗科罗何三副主任医师：结合胸部增强CT，该患者肺部病灶局限，影像评估为可切除局部病变，目前暂无术前新辅助放疗或立体定向放疗（SBRT）指征，同意外科手术治疗。',order:2},
    {id:'c7-4',name:'肺癌手术-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前未见远处系统性转移，全身基础状况良好（ECOG 0-1分）。根据目前局限性分期评估，暂无全身系统性新辅助化疗、靶向或免疫治疗的绝对指征，支持直接行外科手术切除。术后根据大病理的最终分期结果，再行评估是否需要行辅助靶向或化免治疗。',order:3},
    {id:'c7-5',name:'肺癌手术-麻醉评估',text:'麻醉科詹银周副主任医师：患者各项常规术前检查未见明确禁忌，心肺储备功能尚可，能耐受术中单肺通气及全麻。ASA分级Ⅱ-Ⅲ级，无麻醉绝对禁忌证，术中将密切监测单肺通气期间的氧合及气道压力。',order:4},
    {id:'c7-6',name:'肺癌手术-MDT总结',text:'傅俊惠主任医师：综合各科室意见，患者肺恶性肿瘤诊断明确，影像提示局部病灶可切除、无远处转移。鉴于病灶局限且无系统性新辅助指征，结合患者意见，诊疗计划如下：拟直接行胸腔镜下肺楔形/肺段/肺叶切除/肺癌根治术。术后密切关注胸腔引流、肺复张及肺部感染预防，并根据大病理结果指导下一步综合治疗。',order:5},
    {id:'c7-7',name:'肺结节-影像学评估',text:'影像科杜光舟副主任医师：胸部CT提示___见一大小约___mm×___mm的孤立性实性/部分实性/磨玻璃结节，边缘可见毛刺/分叶/胸膜牵拉征/血管穿行征。纵隔及两肺门未见肿大淋巴结。结节具备恶性征象，临床恶性肿瘤可能性大，影像学具备胸腔镜微创探查及切除的解剖条件。',order:6},
    {id:'c7-8',name:'肺结节-病理评估',text:'病理科况丽平主任医师：患者目前病灶较小/位置较深，术前盲目行经皮肺穿刺活检不仅难度大、阳性率低，且并发症风险较高。赞同暂不进行术前有创穿刺活检，支持直接行外科手术探查。我科将在术中全力配合，行“术中快速冰冻病理检查”，根据冰冻结果明确结节性质，以决定后续外科切除范围。',order:7},
    {id:'c7-9',name:'肺结节-放疗评估',text:'肿瘤放疗科罗何三副主任医师：鉴于患者目前结节性质待查，缺乏明确的病理学恶性证据，无任何局部立体定向放疗（SBRT）指征。支持外科行胸腔镜下病灶切除以明确诊断及治疗。',order:8},
    {id:'c7-10',name:'肺结节-肿瘤内科评估',text:'肿瘤内科李绪渊副主任医师：患者当前全身基础状况良好（ECOG 0-1分）。在缺乏明确细胞学或组织病理学恶性证据的前提下，严禁盲目给予任何全身抗肿瘤药物（化疗、靶向或免疫）治疗。赞同首选外科微创手术切除病灶作为明确病理诊断的第一步。',order:9},
    {id:'c7-11',name:'肺结节-麻醉评估',text:'麻醉科詹银周副主任医师：患者术前心肺功能、血气分析及各项常规生化指标基本正常，心肺储备功能可耐受术中单肺通气。ASA分级Ⅱ-Ⅲ级，无麻醉绝对禁忌证。我科将常规做好双腔支气管插管全麻及术中气道压力控制，确保围术期安全。',order:10},
    {id:'c7-12',name:'肺结节-MDT总结',text:'傅俊惠主任医师：综合各科室意见，患者肺部高危结节恶性可能大，具备明确手术指征。鉴于术前穿刺风险高、患者及家属手术意愿明确，经多学科讨论，诊疗计划如下：拟行胸腔镜下肺局部/楔形切除术。术中切除结节后送检术中快速冰冻病理：若冰冻提示为良性或不典型腺样增生，则结束手术；若冰冻提示为浸润性恶性肿瘤（腺癌/鳞癌），则一期行胸腔镜下肺段/肺叶切除术+纵隔淋巴结清扫术（肺癌根治术）。',order:11}
  ]},
  {id:'c8',name:'外购药品申请',order:7,items:[
    {id:'c8-1',name:'静注人免疫球蛋白',text:'通用名：静注人免疫球蛋白（pH4）；商品名：静注人免疫球蛋白；规格：2.5g(5%,50ml)/瓶；生产厂家：哈尔滨派斯菲科生物制药股份有限公司；使用理由：输注人免疫球蛋白提高抵抗力。',order:0},
    {id:'c8-2',name:'人血白蛋白',text:'通用名：人血白蛋白；商品名：人血白蛋白；规格：10g(20%,50ml)/瓶；生产厂家：Biotest Pharma GmbH/德国；使用理由：输注人血白蛋白改善低白蛋白血症。',order:1},
    {id:'c8-3',name:'注射用奥美拉唑（耐信）',text:'通用名：注射用奥美拉唑；商品名：耐信；规格：40mg/支；生产厂家：阿斯利康制药有限公司；使用理由：患者___，现需制酸治疗，患者要求使用耐信制酸。',order:2},
    {id:'c8-4',name:'斯鲁利单抗（汉斯状）',text:'通用名：斯鲁利单抗注射液；商品名：汉斯状；规格：100mg(10ml)/瓶；生产厂家：上海复宏汉霖生物制药有限公司；使用理由：诊断___，采用化免治疗，免疫治疗选用斯鲁利单抗注射液效果较好，但院内无药。',order:3},
    {id:'c8-5',name:'卡度尼利单抗（开坦尼）',text:'通用名：卡度尼利单抗注射液；商品名：开坦尼；规格：125mg(10ml)/瓶；生产厂家：中山康方生物医药有限公司；使用理由：患者新辅助化疗联合免疫治疗，本药品在我院为外购目录，需自行购买。',order:4}
  ]},
  {id:'c9',name:'知情同意书',order:8,items:[
    {id:'c9-1',name:'支气管镜检查',text:'支气管镜检查风险告知：1.麻醉意外；2.喉头水肿、痉挛、窒息；3.咯血；4.肺部感染扩散；5.支气管痉挛、呼吸骤停；6.气胸；7.加重缺氧；8.严重心律失常、心跳骤停；9.血压升高、脑血管意外；10.气管插管意外脱出；11.出血、支气管胸膜瘘、空气栓塞等；12.其他。',order:0},
    {id:'c9-2',name:'食管癌手术',text:'手术累及器官与风险：心脏、肺、气管、胸导管、喉返神经等胸腔内脏器，肝、胆道、胰腺、脾脏、横结肠、十二指肠、小肠等腹腔内脏器，甲状腺、甲状旁腺、喉上神经等颈部脏器，及其周围血管、神经。本例拟行机器人辅助食管癌根治术，具体吻合部位视术中探查而定。尽管机器人视野精细，但若肿瘤侵犯大血管或胸腹腔严重粘连，仍需中转开胸或开腹。术后可能发生吻合口瘘、乳糜胸、喉返神经损伤（声嘶呛咳）或严重肺部感染，若发生将显著延长住院时间，甚至需转入ICU、行肠内营养支持或二次手术抢救。\n\n替代方案：\n1.根治性放化疗：免除手术创伤，但局部控制率与远期疗效通常不如手术，且有食管狭窄或瘘的风险。\n2.最佳支持治疗：仅对症或行支架/造瘘改善进食，不控制肿瘤，生存期短。',order:1},
    {id:'c9-3',name:'结肠癌手术',text:'手术累及器官与风险：肝、胆道、胰腺、十二指肠、小肠、右侧输尿管、右侧生殖血管、下腔静脉神经等腹腔内脏器及周围其他血管、神经。本例拟行结肠癌根治术（半结肠或切除术）。术中精细游离病变肠段、清扫区域淋巴结并进行肠道吻合重建。若术中发现肿瘤浸润周围大血管、严密粘连或解剖不清，为保障安全需立即中转开腹。术后核心风险包括吻合口瘘、腹腔内出血或感染（腹膜炎），一旦发生将导致住院时间显著延长，需禁食、行腹腔引流，严重时需转入ICU或紧急二次手术造瘘抢救。\n\n替代方案：\n1.结肠支架植入/姑息性造瘘：仅解决肠梗阻症状，不切除肿瘤，远期生存差。\n2.单纯化疗或放化疗：适用于晚期或无法耐受手术者，疗效通常不如手术彻底。\n3.最佳支持治疗：仅对症止痛、营养支持，不控制肿瘤进展。',order:2},
    {id:'c9-4',name:'直肠癌手术',text:'手术累及器官与风险：【男】精囊腺、【女】子宫、附件；输尿管、膀胱、回盲部结肠、小肠、髂血管、骶前血管、盆腔神经丛等盆腹腔脏器及周围其他血管、神经。本例拟行直肠癌根治术，术中根据肿瘤距肛门距离决定保留肛门或行永久性造瘘（Miles术式）。术中如遇大出血或严重粘连需中转开腹。由于直肠位置紧邻盆腔神经与周围脏器，术后存在吻合口瘘、盆腔感染及大出血风险，且可能出现不同程度的排尿障碍与性功能障碍，严重吻合口瘘需转ICU或二次手术切除吻合口改行造瘘。\n\n替代方案：\n1.新辅助放化疗后序贯手术：适用于进展期患者，先放化疗降期再行手术。\n2.根治性放化疗/单纯化疗：适用于拒绝手术或无法耐受者，远期局部控制率不如手术。\n3.姑息性造瘘/支架或最佳支持治疗：仅解除梗阻、对症止痛，不控制肿瘤进展。',order:3},
    {id:'c9-5',name:'胃癌手术',text:'手术累及器官与风险：肝、胆道、胰腺、脾脏、结肠、十二指肠、小肠等腹腔内脏器及其周围血管、神经。拟行胃癌根治术（胃大部或全胃切除术）。若术中发现肿瘤浸润胰腺、大血管或腹腔严重粘连，需立即中转开腹。术后核心风险包括吻合口瘘、十二指肠残端瘘、术后胃瘫、腹腔内出血或重症胰腺炎，一旦发生将显著延长住院时间，需长期禁食、胃肠减压，严重时需转入ICU或紧急二次手术抢救。\n\n替代方案：\n1.新辅助化疗后序贯手术：适用于局部进展期患者，先化疗使肿瘤缩小、降期再行手术。\n2.姑息性手术/胃肠短路术/造瘘术：针对伴梗阻但无法切除的晚期患者，仅解决进食问题，不切除肿瘤。\n3.单纯化疗或最佳支持治疗：适用于无法耐受手术的晚期患者，仅控制全身病变或对症支持。',order:4},
    {id:'c9-6',name:'胃食管结合部癌手术',text:'手术累及器官与风险：肝、胆道、胰腺、脾脏、结肠、十二指肠、小肠等腹腔内脏器及其周围血管、神经。本例拟行胃食管结合部癌根治术，由于手术可能需跨越胸腹两腔，若遇严重粘连或大血管浸润需中转开胸开腹。术后核心风险包括胸腹腔吻合口瘘、纵隔或腹膜炎、乳糜胸、喉返神经损伤（声嘶呛咳）及重症肺炎/ARDS。一旦发生将显著延长住院时间，可能需长期禁食、行引流治疗，严重时需转入ICU或二次手术抢救。\n\n替代方案：\n1.新辅助放化疗/化疗后序贯手术：适用于局部进展期，先综合治疗降期后再行手术，有助于提高切除率。\n2.根治性放化疗或单纯化疗：适用于无法耐受手术或晚期患者，局部控制率和远期疗效通常不如手术。\n3.空肠造瘘/食管支架或最佳支持治疗：针对无法切除的梗阻患者，仅对症解决进食，不控制肿瘤。',order:5},
    {id:'c9-7',name:'肺癌手术',text:'手术累及器官与风险：心脏、主动脉、肺动静脉及其他大血管、气管及支气管、胸导管、喉返神经等胸腔内脏器及周围其他血管、神经等。若冰冻病理结果提示为肺癌，将进一步行肺癌根治性手术，术中切除肺叶范围及清扫淋巴结范围由术中探查所见决定；【或】因术前已明确肺肿瘤病理性质，本次手术将直接行肺癌根治性手术，术中切除肺叶范围及清扫淋巴结范围由术中探查所见决定。风险条目：1-5、7-12、21、24-29；18。\n\n替代方案：保守观察/放化疗。一旦肿瘤为恶性将导致延误治疗，严重时危及生命；远期治疗效果不如手术治疗。',order:6},
    {id:'c9-8',name:'肝癌手术',text:'手术累及器官与风险：胆管、门静脉、胰腺、胃、十二指肠、脾脏、结肠、小肠、右肾、右输尿管、右侧生殖血管、下腔静脉等腹腔内脏器及周围其他血管、神经。补充说明：术中视具体情况可能需切除胆囊；术中肝脏具体切除范围由术中探查所见决定；术后可能出现胆汁瘘、梗阻性黄疸、胰腺炎、肝功能衰竭等并发症，或出现凝血功能异常、低蛋白血症、腹水、肝性脑病等肝功能损害相关并发症。风险条目：1-5、7、8、15、24-28；13。\n\n替代方案：放化疗、介入治疗等；远期治疗效果不如手术治疗。',order:7}
  ]},
  {id:'c10',name:'参考信息',order:9,items:[
    {id:'c10-1',name:'MDT科室列表',text:'MDT多学科会诊参与科室：食管胃肠肿瘤外科、肿瘤放疗科、肿瘤内科、医学影像科、病理科、麻醉科、内镜中心、超声介入科。',order:0}
  ]}
]}




// ==================== Siri Search ====================
function siriSearch(q){
  var data=load();var results=[];
  data.categories.forEach(function(cat){cat.items.forEach(function(item){if(item.name.toLowerCase().indexOf(q.toLowerCase())!==-1)results.push({catName:cat.name,catId:cat.id,itemId:item.id,itemName:item.name,text:item.text})})});
  if(results.length===0){toast('未找到: '+q);return}
  if(results.length===1){var r=results[0];currentCatId=r.catId;currentItemId=r.itemId;renderL3(r.catId,r.itemId);goTo(pageL3,r.itemName,true);return}
  // Multiple results
  isSearchMode=true;currentCatId=results[0].catId;itemGrid.innerHTML='';
  itemGrid.style.gridTemplateColumns=results.length===1?'1fr':'1fr 1fr';
  itemGrid.style.maxWidth=results.length===1?'200px':'';itemGrid.style.margin=results.length===1?'0 auto':'';
  results.forEach(function(r){
    var card=document.createElement('div');card.className='item-card';card.style.backgroundColor='hsl(220,40%,35%)';
    card.innerHTML='<div class="item-name">'+escHtml(r.itemName)+'</div><div class="item-meta">'+escHtml(r.catName)+' · '+r.text.length+'字</div>';
    var ts=0,tm=false;card.addEventListener('touchstart',function(){ts=Date.now();tm=false});card.addEventListener('touchmove',function(){tm=true});
    card.addEventListener('touchend',function(){if(!tm&&Date.now()-ts<400){currentCatId=r.catId;currentItemId=r.itemId;renderL3(r.catId,r.itemId);goTo(pageL3,r.itemName,true)}});
    itemGrid.appendChild(card);
  });
  addBtn.classList.remove('visible');goTo(pageL2,'搜索: '+q,true);
}

// ==================== Temp: Split & QR ====================
function splitText(text,maxLen){maxLen=maxLen||200;var chunks=[];var remain=text;while(remain.length>maxLen){var cut=maxLen;var p=remain.lastIndexOf('。',maxLen);if(p>maxLen*0.5)cut=p+1;else{var s=remain.lastIndexOf('；',maxLen);if(s>maxLen*0.5)cut=s+1;else{var n=remain.lastIndexOf('\n',maxLen);if(n>maxLen*0.5)cut=n+1}}chunks.push(remain.slice(0,cut).trim());remain=remain.slice(cut).trim()}if(remain)chunks.push(remain);return chunks}

var tempChunks=[],tempChunkIdx=0,tempOrigText='';
function renderTempQR(chunks,fullText){
  tempChunks=chunks;tempChunkIdx=0;tempOrigText=fullText||'';
  document.getElementById('tempQrHint').textContent='此二维码含医疗文本，使用后请关闭页面';
  showTempChunk();
  var splitNav=document.getElementById('splitNav');
  splitNav.style.display=chunks.length>1?'flex':'none';
  document.getElementById('splitIndicator').textContent=chunks.length>1?'Part 1 / '+chunks.length:'';
  document.getElementById('splitPrev').disabled=true;
  document.getElementById('splitNext').disabled=chunks.length<2;
}
function showTempChunk(){
  var chunk=tempChunks[tempChunkIdx];
  document.getElementById('tempQrWhite').innerHTML='';
  document.getElementById('tempQrMeta').textContent=chunk.length+' 字';
  genQR(chunk,Math.min(window.innerWidth*0.8,500),function(c){if(c)document.getElementById('tempQrWhite').appendChild(c)});
  if(tempChunks.length>1){
    document.getElementById('splitIndicator').textContent='Part '+(tempChunkIdx+1)+' / '+tempChunks.length;
    document.getElementById('splitPrev').disabled=tempChunkIdx===0;
    document.getElementById('splitNext').disabled=tempChunkIdx>=tempChunks.length-1;
  }
}

function saveTempToCategory(){
  if(!tempOrigText){toast('\u65e0\u53ef\u4fdd\u5b58\u7684\u6587\u672c');return}
  var data=load();
  var h='<div class="modal-header"><h2>\u4fdd\u5b58\u5230\u5206\u7c7b</h2><button class="modal-close-btn" id="tempPickerClose">&times;</button></div>';
  data.categories.forEach(function(cat){h+='<div class="settings-item" id="tempsave-'+cat.id+'" style="cursor:pointer"><span>'+escHtml(cat.name)+'</span><span style="color:#888;font-size:12px">'+(cat.items?cat.items.length:0)+' \u9879</span></div>'});
  h+='<button class="btn-sm" id="tempSaveNewCat" style="width:100%;margin-top:8px">+ \u65b0\u5efa\u5206\u7c7b</button>';
  document.getElementById('settingsContent').innerHTML=h;
  document.getElementById('settingsModal').classList.add('open');
  document.getElementById('tempPickerClose').onclick=function(){document.getElementById('settingsModal').classList.remove('open')};
  data.categories.forEach(function(cat){document.getElementById('tempsave-'+cat.id).onclick=function(){document.getElementById('settingsModal').classList.remove('open');showItemEditor(cat.id,null,tempOrigText)}});
  document.getElementById('tempSaveNewCat').onclick=function(){
    var name=prompt('\u8f93\u5165\u65b0\u5206\u7c7b\u540d\u79f0');
    if(!name||!name.trim())return;
    var d=load();
    d.categories.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name.trim(),order:d.categories.length,items:[]});
    save(d);renderL1();
    document.getElementById('settingsModal').classList.remove('open');
    var newCat=d.categories[d.categories.length-1];
    showItemEditor(newCat.id,null,tempOrigText);
  }
}

// ==================== Temp: Photo \u2192 iOS Live Text ====================
var ocrCancelFlag=false;
var tempLastInput=null;

function showPhotoOnCanvas(file,canvas,cb){
  if(window.createImageBitmap){
    createImageBitmap(file,{imageOrientation:'from-image'}).then(function(bmp){
      var maxW=Math.min(window.innerWidth-32,1200),maxH=600;
      var scale=Math.min(maxW/bmp.width,maxH/bmp.height,1);
      canvas.width=Math.round(bmp.width*scale);canvas.height=Math.round(bmp.height*scale);
      var ctx=canvas.getContext('2d');ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(bmp,0,0,canvas.width,canvas.height);
      canvas.style.display='block';if(cb)cb(canvas);
    }).catch(function(){fallbackShowPhoto(file,canvas,cb)});
  }else{fallbackShowPhoto(file,canvas,cb)}
}
function fallbackShowPhoto(file,canvas,cb){
  var img=new Image();
  img.onload=function(){
    var maxW=Math.min(window.innerWidth-32,1200),maxH=600;
    var scale=Math.min(maxW/img.width,maxH/img.height,1);
    canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
    var ctx=canvas.getContext('2d');ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    canvas.style.display='block';if(cb)cb(canvas);
  };
  img.onerror=function(){toast('\u56fe\u7247\u52a0\u8f7d\u5931\u8d25')};
  img.src=URL.createObjectURL(file);
}

function showPhoto(file){
  var canvas=document.getElementById('ocrPreview'),editor=document.getElementById('ocrEditor');
  ocrCancelFlag=false;
  showPhotoOnCanvas(file,canvas,function(){
    document.getElementById('ocrHint').style.display='block';
    editor.value='';editor.focus();
  });
}

function initTempOCR(){
  var cameraInp=document.getElementById('ocrFileInput');
  var libraryInp=document.getElementById('ocrLibraryInput');
  var editor=document.getElementById('ocrEditor');
  var canvas=document.getElementById('ocrPreview'),hint=document.getElementById('ocrHint');

  function handleFile(file){if(file)showPhoto(file)}

  document.getElementById('btnOcr').addEventListener('click',function(){
    tempLastInput='ocr';goTo(document.getElementById('page-temp-ocr'),'\u62cd\u7167\u8bc6\u522b',true);cameraInp.click();
  });
  cameraInp.addEventListener('change',function(){if(this.files&&this.files[0])handleFile(this.files[0])});
  libraryInp.addEventListener('change',function(){if(this.files&&this.files[0])handleFile(this.files[0])});

  document.getElementById('ocrRetake').addEventListener('click',function(){
    ocrCancelFlag=true;
    hint.style.display='block';
    cameraInp.value='';cameraInp.click();
  });
  document.getElementById('ocrLibrary').addEventListener('click',function(){
    ocrCancelFlag=true;
    hint.style.display='block';
    libraryInp.value='';libraryInp.click();
  });
  document.getElementById('ocrPaste').addEventListener('click',function(){
    navigator.clipboard.readText().then(function(t){
      if(t.trim()){editor.value=t;toast('\u5df2\u7c98\u8d34 '+t.length+'\u5b57')}else{toast('\u526a\u8d34\u677f\u4e3a\u7a7a')}
    }).catch(function(){toast('\u65e0\u6cd5\u8bbf\u95ee\u526a\u8d34\u677f\uff0c\u8bf7\u624b\u52a8\u957f\u6309\u7c98\u8d34')});
  });
  document.getElementById('ocrGenerate').addEventListener('click',function(){
    var txt=editor.value.trim();if(!txt){toast('\u8bf7\u5148\u7c98\u8d34\u6216\u624b\u52a8\u8f93\u5165\u6587\u5b57');return}
    var chunks=splitText(txt);renderTempQR(chunks,txt);goTo(document.getElementById('page-temp-qr'),'\u4e34\u65f6\u4e8c\u7ef4\u7801',true);
  });
}

// ==================== Temp: Voice ====================
var recognition=null,voiceActive=false,voiceFinal='';
function initTempVoice(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var btn=document.getElementById('voiceBtn');var status=document.getElementById('voiceStatus');var editor=document.getElementById('voiceEditor');
  document.getElementById('btnVoice').addEventListener('click',function(){
    tempLastInput='voice';goTo(document.getElementById('page-temp-voice'),'语音输入',true);
  });
  if(!SR){
    btn.style.display='none';status.textContent='请使用键盘麦克风按钮进行语音输入';
    editor.placeholder='点击键盘上的麦克风按钮开始语音输入...';return;
  }
  recognition=new SR();recognition.lang='zh-CN';recognition.interimResults=true;recognition.continuous=true;
  recognition.onresult=function(e){var t='';for(var i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;editor.value=t;voiceFinal=t};
  recognition.onerror=function(e){if(e.error!=='no-speech'&&e.error!=='aborted')toast('语音识别错误: '+e.error);stopVoiceUI()};
  recognition.onend=function(){if(voiceActive){try{recognition.start()}catch(e){stopVoiceUI()}}};
  btn.addEventListener('click',function(){
    if(!voiceActive){voiceActive=true;voiceFinal='';editor.value='';btn.classList.add('recording','voice-pulse');status.textContent='正在聆听... 点击停止';try{recognition.start()}catch(e){toast('语音启动失败');stopVoiceUI()}}
    else{recognition.stop();stopVoiceUI()}
  });
  document.getElementById('voiceClear').addEventListener('click',function(){editor.value='';voiceFinal='';status.textContent='已清除，点击重新录音'});
  document.getElementById('voiceGenerate').addEventListener('click',function(){
    var txt=editor.value.trim();if(!txt){toast('请先录音或手动输入文字');return}
    var chunks=splitText(txt);renderTempQR(chunks,txt);goTo(document.getElementById('page-temp-qr'),'临时二维码',true);
  });
}
function stopVoiceUI(){voiceActive=false;var btn=document.getElementById('voiceBtn');btn.classList.remove('recording','voice-pulse');document.getElementById('voiceStatus').textContent='点击开始录音'}
