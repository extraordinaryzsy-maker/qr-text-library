<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="病历书写助手">
<meta name="theme-color" content="#0f0f1a">
<title>病历书写助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;min-height:-webkit-fill-available;user-select:none;-webkit-user-select:none;overflow-x:hidden}

.nav{display:flex;align-items:center;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px 16px;background:#1a1a2e;position:sticky;top:0;z-index:10;gap:12px;border-bottom:1px solid #2a2a4a}
.nav-back{width:32px;height:32px;border-radius:50%;background:#2a2a4a;border:none;color:#ccc;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.nav-back.visible{display:flex}
.nav-title{font-size:16px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.page{display:none;padding:16px;padding-bottom:100px}
.page.active{display:block}

/* L1 */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-card{border-radius:16px;padding:24px 12px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;min-height:80px;display:flex;align-items:center;justify-content:center;position:relative}
.cat-card:active{transform:scale(.96)}
.cat-card.dragging{opacity:.85;transform:scale(1.05);z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.cat-card.drop-target{outline:3px dashed rgba(255,255,255,.6);outline-offset:2px}
.cat-name{font-size:15px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);line-height:1.3}
.cat-count{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}

.ghost{position:fixed;pointer-events:none;z-index:200;opacity:.9;transform:scale(1.08);box-shadow:0 12px 40px rgba(0,0,0,.6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff;text-align:center;padding:24px 12px;text-shadow:0 1px 2px rgba(0,0,0,.3)}

/* L2 */
.l2-wrapper{display:flex;flex-direction:column;min-height:calc(100vh - 150px);justify-content:center}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:center}
.item-card{border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:transform .15s;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.item-card:active{transform:scale(.96)}
.item-card.dragging{opacity:.85;transform:scale(1.05);z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.item-card.drop-target{outline:3px dashed rgba(255,255,255,.6);outline-offset:2px}
.item-name{font-size:14px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.item-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}

/* L3 */
.qr-container{display:flex;flex-direction:column;align-items:center;padding-top:20px}
.qr-white{background:#fff;border-radius:16px;padding:16px;display:inline-block}
.qr-white canvas{display:block;max-width:82vw;max-height:58vh}
.l3-meta{text-align:center;margin-top:20px;color:#888;font-size:14px}
.l3-actions{display:flex;gap:12px;margin-top:20px;width:100%;max-width:340px}
.btn-outline{flex:1;padding:12px;background:transparent;border:1px solid #444;border-radius:10px;color:#ccc;font-size:14px;cursor:pointer;text-align:center;transition:border-color .2s}
.btn-outline:active{border-color:#7c8aff}
.btn-danger{flex:1;padding:12px;background:transparent;border:1px solid #5a1a1a;border-radius:10px;color:#e74c3c;font-size:14px;cursor:pointer;text-align:center}

/* Floating buttons */
.float-btn{border-radius:50%;background:#2a2a4a;border:1px solid #3a3a5a;color:#aaa;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);transition:all .2s}
.float-btn:active{background:#3a3a5a;transform:scale(.95)}
.settings-btn{position:fixed;bottom:24px;right:24px;width:48px;height:48px;font-size:22px}
.add-btn{position:fixed;bottom:24px;left:24px;width:48px;height:48px;font-size:28px;display:none}
.add-btn.visible{display:flex}

/* Settings modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:150;overflow-y:auto}
.modal-overlay.open{display:block}
.modal-content{background:#1a1a2e;margin:20px;border-radius:16px;padding:20px;min-height:calc(100vh - 40px)}
.modal-header{display:flex;align-items:center;margin-bottom:16px}
.modal-header h2{flex:1;font-size:18px}
.modal-close-btn{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:8px}
.section-title{font-size:13px;color:#666;letter-spacing:1px;margin:20px 0 8px}
.settings-list{}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 12px;background:#1a1a2e;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.settings-item:active{background:#252540}
.settings-item .si-name{font-size:15px;color:#e0e0e0}
.settings-item .si-meta{font-size:12px;color:#666}
.settings-item .si-arrow{color:#555;font-size:16px}

/* Settings - item editor */
.editor-label{font-size:12px;color:#888;margin:12px 0 4px}
.editor-input{width:100%;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:10px;color:#e0e0e0;font-size:15px;outline:none;margin-bottom:4px}
.editor-input:focus{border-color:#7c8aff}
.editor-textarea{width:100%;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:10px;color:#e0e0e0;font-size:14px;min-height:140px;resize:vertical;outline:none;line-height:1.6}
.editor-textarea:focus{border-color:#7c8aff}

.btn{padding:10px 0;background:#7c8aff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;display:block;width:100%}
.btn:active{opacity:.8}
.btn-sm{padding:8px 18px;background:#7c8aff;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-sm.danger{background:#c0392b}
.btn-sm.secondary{background:#444}
.btn-sm:active{opacity:.7}

.empty-state{text-align:center;color:#555;padding:60px 20px;font-size:15px;line-height:1.8}

.l3-privacy{text-align:center;margin-top:16px;color:#555;font-size:12px;line-height:1.6;max-width:300px;white-space:pre-line}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#7c8aff;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Temp input section */
.temp-section{padding:0 0 16px 0}
.temp-label{font-size:13px;color:#666;letter-spacing:1px;margin-bottom:10px}
.temp-buttons{display:flex;gap:12px}
.temp-btn{flex:1;border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:transform .15s;border:none;background:#1e1e3a;color:#ccc;font-size:13px;font-weight:600}
.temp-btn:active{transform:scale(.96)}
.temp-btn-icon{font-size:32px;display:block;margin-bottom:6px}

/* OCR preview & iOS Live Text hint */
.ocr-preview{width:100%;max-height:500px;object-fit:contain;border-radius:12px;margin-bottom:12px;display:none;background:#000}
.ocr-hint{text-align:center;color:#888;font-size:13px;line-height:1.7;padding:8px 16px;margin-bottom:8px;background:#1a1a2e;border-radius:10px}
.ocr-hint-steps{display:flex;flex-direction:column;gap:6px;text-align:left}
.ocr-step{display:flex;align-items:center;gap:8px;color:#ccc;font-size:14px}
.ocr-step-num{width:22px;height:22px;border-radius:50%;background:#7c8aff;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Voice recording */
.voice-control{display:flex;flex-direction:column;align-items:center;padding:30px 0}
.voice-btn{width:80px;height:80px;border-radius:50%;border:3px solid #444;background:#1e1e3a;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;transition:all .2s}
.voice-btn.recording{border-color:#e74c3c;box-shadow:0 0 0 8px rgba(231,76,60,.2)}
.voice-pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}70%{box-shadow:0 0 0 16px rgba(231,76,60,0)}100%{box-shadow:0 0 0 0 rgba(231,76,60,0)}}
.voice-status{color:#888;font-size:13px;margin-top:14px}

/* Text editor (shared by OCR & voice) */
.temp-editor{width:100%;min-height:120px;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:12px;color:#e0e0e0;font-size:14px;resize:vertical;outline:none;line-height:1.7;margin-bottom:12px}
.temp-editor:focus{border-color:#7c8aff}
.temp-actions{display:flex;gap:12px}
.temp-actions .btn{flex:1}

/* Split QR nav */
.split-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
.split-nav-btn{width:40px;height:40px;border-radius:50%;background:#2a2a4a;border:1px solid #3a3a5a;color:#ccc;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.split-nav-btn:disabled{opacity:.3}
.split-indicator{color:#888;font-size:14px;min-width:60px;text-align:center}

/* Login */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;min-height:-webkit-fill-available;padding:24px}
.login-icon{font-size:48px;margin-bottom:16px}
.login-title{font-size:20px;font-weight:700;margin-bottom:24px;color:#e0e0e0}
.login-input{width:100%;max-width:300px;padding:14px;background:#1a1a2e;border:1px solid #3a3a5a;border-radius:12px;color:#e0e0e0;font-size:15px;outline:none;margin-bottom:12px;transition:border-color .2s}
.login-input:focus{border-color:#7c8aff}
.login-input.error{border-color:#e74c3c}
.login-error{color:#e74c3c;font-size:13px;margin-bottom:12px;min-height:20px;text-align:center;max-width:300px}
.login-btn{width:100%;max-width:300px;padding:14px;background:#7c8aff;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.login-btn:active{opacity:.8}
.login-setup-hint{color:#888;font-size:13px;margin-top:16px;text-align:center;max-width:300px;line-height:1.6}

/* Login disclaimer inside login page */
.login-disclaimer{color:#666;font-size:12px;text-align:center;max-width:300px;line-height:1.6;margin-top:20px}

/* Search bar */
.search-wrap{display:none;padding:8px 16px;background:#1a1a2e;border-bottom:1px solid #2a2a4a}
.search-wrap.open{display:flex;align-items:center;gap:6px}
.search-input{flex:1;padding:10px 8px;background:#0f0f1a;border:1px solid #3a3a5a;border-radius:10px;color:#e0e0e0;font-size:13px;outline:none;min-width:0}
.search-input:focus{border-color:#7c8aff}
.search-input.name{border-color:#4a4a7a}
.search-input.name:focus{border-color:#7c8aff}
.search-input.content{border-color:#4a5a4a}
.search-input.content:focus{border-color:#6abf6a}
.search-cancel{background:none;border:none;color:#888;font-size:14px;cursor:pointer;padding:8px;white-space:nowrap}
.nav-search-btn{width:32px;height:32px;border-radius:50%;background:#2a2a4a;border:none;color:#ccc;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.nav-search-btn.visible{display:flex}

/* Recent & Favorites */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:16px 0 6px}
.section-header .sh-title{font-size:13px;color:#666;letter-spacing:1px}
.mini-grid{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:8px;margin-bottom:4px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.mini-grid::-webkit-scrollbar{display:none}
.mini-card{border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;transition:transform .15s;min-height:50px;min-width:80px;max-width:120px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;word-break:break-all;line-height:1.3;flex-shrink:0;scroll-snap-align:start}
.mini-card:active{transform:scale(.95)}

/* PIN Lock */
.pin-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,20,.97);z-index:500;flex-direction:column;align-items:center;justify-content:center}
.pin-overlay.active{display:flex}
.pin-title{color:#fff;font-size:18px;font-weight:600;margin-bottom:6px}
.pin-sub{color:#666;font-size:13px;margin-bottom:24px}
.pin-dots{display:flex;gap:12px;margin-bottom:28px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #444;transition:background .15s}
.pin-dot.filled{background:#7c8aff;border-color:#7c8aff}
.pin-numpad{display:grid;grid-template-columns:repeat(3,64px);gap:10px}
.pin-key{width:64px;height:64px;border-radius:50%;background:#1e1e3a;border:1px solid #2a2a4a;color:#ccc;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:#2a2a5a}
.pin-key.pin-del{font-size:14px;color:#888}
.pin-key.pin-ok{font-size:14px;color:#7c8aff}

/* Auto-advance */
.auto-advance-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}
.auto-advance-switch{width:44px;height:24px;border-radius:12px;background:#333;border:none;cursor:pointer;position:relative;transition:background .2s}
.auto-advance-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.auto-advance-switch.on{background:#7c8aff}
.auto-advance-switch.on::after{left:22px}
.auto-advance-label{font-size:12px;color:#888}

/* Fav button */
.btn-icon-only{width:44px;height:44px;border-radius:50%;background:transparent;border:1px solid #444;color:#aaa;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s}
.btn-icon-only:active{border-color:#7c8aff}
.btn-icon-only.faved{color:#e74c3c;border-color:#5a1a1a}
</style>
</head>
<body>

<div class="nav" id="nav">
  <button class="nav-back" id="navBack">&#x2039;</button>
  <div class="nav-title" id="navTitle">病历书写助手</div>
  <button class="nav-search-btn" id="navSearchBtn">&#x1F50D;</button>
</div>

<!-- Login page -->
<div class="page active" id="page-login">
  <div class="login-wrap">
    <div class="login-icon">&#x1F512;</div>
    <div class="login-title" id="loginTitle">病历书写助手</div>
    <input type="text" class="login-input" id="loginUser" placeholder="请输入账户名" autocomplete="off">
    <input type="password" class="login-input" id="loginPass" placeholder="请输入密码">
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">登 录</button>
    <div class="login-setup-hint" id="loginSetupHint" style="display:none"></div>
    <div class="login-disclaimer">
      本工具为临床医疗文书模板管理助手，旨在协助执业医师提高电子病历录入效率。最终病历内容须由临床医生审核确认后录入医院信息系统。本软件不涉及患者隐私数据的采集、传输或云端存储，所有数据仅保存在您的设备本地。
    </div>
  </div>
</div>

<!-- Search bar -->
<div class="search-wrap" id="searchWrap">
  <input type="text" class="search-input name" id="nameSearchInput" placeholder="搜索名称...">
  <input type="text" class="search-input content" id="contentSearchInput" placeholder="搜索内容...">
  <button class="search-cancel" id="searchCancel">取消</button>
</div>

<!-- PIN Lock overlay -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-title" id="pinTitle">输入访问密码</div>
  <div class="pin-sub" id="pinSub">输入4位数字密码</div>
  <div class="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-numpad">
    <button class="pin-key" data-key="1">1</button>
    <button class="pin-key" data-key="2">2</button>
    <button class="pin-key" data-key="3">3</button>
    <button class="pin-key" data-key="4">4</button>
    <button class="pin-key" data-key="5">5</button>
    <button class="pin-key" data-key="6">6</button>
    <button class="pin-key" data-key="7">7</button>
    <button class="pin-key" data-key="8">8</button>
    <button class="pin-key" data-key="9">9</button>
    <button class="pin-key pin-del" data-key="del">&#x232B;</button>
    <button class="pin-key" data-key="0">0</button>
    <button class="pin-key pin-ok" data-key="ok">OK</button>
  </div>
</div>

<!-- L1 -->
<div class="page" id="page-l1">
  <div class="temp-section">
    <div class="temp-label">临时输入</div>
    <div class="temp-buttons">
      <button class="temp-btn" id="btnOcr"><span class="temp-btn-icon">&#x1F4F7;</span>拍照识别</button>
      <button class="temp-btn" id="btnVoice"><span class="temp-btn-icon">&#x1F3A4;</span>语音输入</button>
      <button class="temp-btn" id="btnFileImport"><span class="temp-btn-icon">&#x1F4C2;</span>文件导入</button>
    </div>
  </div>
  <div class="temp-label">常用模板</div>
  <div class="cat-grid" id="catGrid"></div>
  <div class="empty-state" id="l1Empty" style="display:none">还没有分类<br>点击右下角 &#x2699; 进入设置，创建您的第一个分类</div>
</div>

<!-- L2 -->
<div class="page" id="page-l2">
  <div class="l2-wrapper"><div class="item-grid" id="itemGrid"></div></div>
</div>

<!-- L3 -->
<div class="page" id="page-l3">
  <div class="qr-container">
    <div class="qr-white" id="qrWhite"></div>
    <div class="l3-meta" id="l3Meta"></div>
    <div class="l3-actions">
      <button class="btn-icon-only" id="favItemBtn">&#x2661;</button>
      <button class="btn-outline" id="editItemBtn" style="flex:1">编辑文本</button>
      <button class="btn-outline" id="historyBtn" style="display:none">历史</button>
      <button class="btn-outline" id="moveItemBtn">移动</button>
      <button class="btn-danger" id="deleteItemBtn">删除</button>
    </div>
    <div class="l3-privacy" id="l3PrivacyHint"></div>
  </div>
</div>

<!-- Temp OCR page — iOS Live Text primary -->
<div class="page" id="page-temp-ocr">
  <input type="file" id="ocrFileInput" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="ocrLibraryInput" accept="image/*" style="display:none">
  <canvas class="ocr-preview" id="ocrPreview"></canvas>
  <div class="ocr-hint" id="ocrHint">
    <div class="ocr-hint-steps">
      <div class="ocr-step"><span class="ocr-step-num">1</span> 长按照片</div>
      <div class="ocr-step"><span class="ocr-step-num">2</span> 拖选文字后点「复制」</div>
      <div class="ocr-step"><span class="ocr-step-num">3</span> 点下方「粘贴」按钮</div>
    </div>
  </div>
  <textarea class="temp-editor" id="ocrEditor" placeholder="粘贴后文字将显示在此处，可编辑修改..."></textarea>
  <div class="temp-actions">
    <button class="btn" id="ocrPaste" style="background:#3a3a5a">粘贴</button>
    <button class="btn" id="ocrRetake" style="background:#3a3a5a">重拍</button>
    <button class="btn" id="ocrLibrary" style="background:#3a3a5a">相册</button>
    <button class="btn" id="ocrNormalize" style="background:#3a3a5a">规范化</button>
    <button class="btn" id="ocrAutoBtn" style="background:#4a6a4a;display:none">自动识别</button>
    <button class="btn" id="ocrGenerate" style="background:#7c8aff">生成二维码</button>
  </div>
</div>

<!-- Temp voice page -->
<div class="page" id="page-temp-voice">
  <div class="voice-control">
    <button class="voice-btn" id="voiceBtn">&#x1F3A4;</button>
    <div class="voice-status" id="voiceStatus">点击开始录音</div>
  </div>
  <textarea class="temp-editor" id="voiceEditor" placeholder="语音识别结果将显示在此处，可直接编辑修改..."></textarea>
  <div class="temp-actions">
    <button class="btn" id="voiceClear">清除重录</button>
    <button class="btn" id="voiceNormalize" style="background:#3a3a5a">规范化</button>
    <button class="btn" id="voiceGenerate" style="background:#7c8aff">生成二维码</button>
  </div>
</div>

<!-- Temp QR result page -->
<div class="page" id="page-temp-qr">
  <div class="qr-container">
    <div class="qr-white" id="tempQrWhite"></div>

<script>
var STORAGE_KEY = 'qrlib_v25';
var RECENT_KEY = 'qrlib_v25_recent';
var PIN_KEY = 'qrlib_v25_pin';

function getRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY))||[]}catch(e){return[]}}
function addRecent(catId,itemId,catName,itemName,itemText){
  var r=getRecent().filter(function(e){return e.itemId!==itemId});
  r.unshift({catId:catId,itemId:itemId,catName:catName,itemName:itemName,text:itemText,ts:Date.now()});
  if(r.length>10)r.length=10;
  localStorage.setItem(RECENT_KEY,JSON.stringify(r));
}
var FAV_CAT_ID='__fav__';
function getFavCat(){var d=load();return d.categories.find(function(c){return c.id===FAV_CAT_ID})||null}
function ensureFavCat(){
  var d=load();
  if(!d.categories.some(function(c){return c.id===FAV_CAT_ID})){
    d.categories.unshift({id:FAV_CAT_ID,name:'收藏夹',order:-1,items:[]});
    save(d);
  }
}
function isFaved(itemId){var fc=getFavCat();return fc?fc.items.some(function(i){return i.id===itemId}):false}
function toggleFavItem(catId,itemId,catName,itemName,itemText,tags){
  var d=load();var fc=d.categories.find(function(c){return c.id===FAV_CAT_ID});
  if(!fc){ensureFavCat();d=load();fc=d.categories.find(function(c){return c.id===FAV_CAT_ID})}
  var idx=fc.items.findIndex(function(i){return i.id===itemId});
  if(idx>=0){fc.items.splice(idx,1);save(d);return false}
  else{fc.items.push({id:itemId,name:itemName,text:itemText,order:fc.items.length,tags:tags||[]});save(d);return true}
}

// ==================== Data ====================
function load(){
  try{var d=JSON.parse(localStorage.getItem(STORAGE_KEY));if(d&&d.categories)return d}catch(e){}
  return {categories:[]};
}
function save(data){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
function sortCats(data){data.categories.sort(function(a,b){return a.order-b.order})}
function findCat(id){var d=load();for(var i=0;i<d.categories.length;i++){if(d.categories[i].id===id)return d.categories[i]}return null}
function findItem(cat,id){for(var i=0;i<cat.items.length;i++){if(cat.items[i].id===id)return cat.items[i]}return null}

// ==================== Colors ====================
function catColor(index,total){var hue=(index*Math.floor(360/(total||1)))%360;return 'hsl('+hue+',58%,48%)'}
function itemColor(catHue,index,total){var hue=(catHue+index*Math.floor(360/(total||1)*0.4))%360;return 'hsl('+hue+',40%,42%)'}

// ==================== Toast ====================
var toastTimer;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show')},1800)}

// ==================== QR ====================
function genQR(text,size,cb){if(typeof QRCode==='undefined'){cb(null);return}var c=document.createElement('canvas');QRCode.toCanvas(c,text,{width:size||300,margin:2,color:{dark:'#000',light:'#fff'}},function(err){cb(err?null:c)})}

// ==================== Navigation ====================
var navBack=document.getElementById('navBack');
var navTitle=document.getElementById('navTitle');
var pageL1=document.getElementById('page-l1');
var pageL2=document.getElementById('page-l2');
var pageL3=document.getElementById('page-l3');
var catGrid=document.getElementById('catGrid');
var itemGrid=document.getElementById('itemGrid');
var l1Empty=document.getElementById('l1Empty');
var addBtn=document.getElementById('addBtn');
var currentCatId=null,currentItemId=null;
var isSearchMode=false;

function goTo(page,title,showBack){
  document.getElementById('page-login').classList.remove('active');
  pageL1.classList.remove('active');pageL2.classList.remove('active');pageL3.classList.remove('active');
  document.getElementById('page-temp-ocr').classList.remove('active');document.getElementById('page-temp-voice').classList.remove('active');document.getElementById('page-temp-qr').classList.remove('active');
  page.classList.add('active');
  navTitle.textContent=title;
  if(showBack){navBack.classList.add('visible')}else{navBack.classList.remove('visible')}
  addBtn.classList.remove('visible');
  // Show search button on L1 and L2 pages
  var searchBtn=document.getElementById('navSearchBtn');
  var searchWrap=document.getElementById('searchWrap');

// Drag-to-swap
var dragCard=null,dragCatId=null,dragItemId=null,dragItemCatId=null,ghost=null,offsetX=0,offsetY=0;
function startDrag(card,catId,e,itemId){dragCard=card;dragCatId=catId;dragItemId=itemId||null;dragItemCatId=itemId?catId:null;card.classList.add('dragging');ghost=document.createElement('div');ghost.className='ghost';ghost.style.width=card.offsetWidth+'px';ghost.style.height=card.offsetHeight+'px';ghost.style.backgroundColor=card.style.backgroundColor;ghost.innerHTML=card.innerHTML;document.body.appendChild(ghost);var t=e.touches[0];var r=card.getBoundingClientRect();offsetX=t.clientX-r.left;offsetY=t.clientY-r.top;moveGhost(t.clientX,t.clientY)}
function moveGhost(x,y){if(!ghost)return;ghost.style.left=(x-offsetX)+'px';ghost.style.top=(y-offsetY)+'px'}
document.addEventListener('touchmove',function(e){if(!dragCard)return;e.preventDefault();var t=e.touches[0];moveGhost(t.clientX,t.clientY);var isItem=dragCard.classList.contains('item-card');var sel=isItem?'.item-card':'.cat-card';document.querySelectorAll(sel).forEach(function(c){c.classList.remove('drop-target');if(c===dragCard)return;var r=c.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){c.classList.add('drop-target')}})},{passive:false});
document.addEventListener('touchend',function(){if(!dragCard)return;var isItem=dragCard.classList.contains('item-card');var sel=isItem?'.item-card':'.cat-card';var t=document.querySelector(sel+'.drop-target');if(t){if(isItem){var tid=t.getAttribute('data-iid');swapItems(dragItemCatId,dragItemId,tid)}else{var tid=t.getAttribute('data-cid');swapCategories(dragCatId,tid)}}dragCard.classList.remove('dragging');document.querySelectorAll(sel).forEach(function(c){c.classList.remove('drop-target')});if(ghost){ghost.remove();ghost=null}dragCard=null;dragCatId=null;dragItemId=null;dragItemCatId=null});
function swapCategories(id1,id2){var d=load();var c1=d.categories.find(function(c){return c.id===id1});var c2=d.categories.find(function(c){return c.id===id2});if(!c1||!c2)return;var t=c1.order;c1.order=c2.order;c2.order=t;save(d);renderL1()}
function swapItems(catId,id1,id2){var d=load();var cat=d.categories.find(function(c){return c.id===catId});if(!cat)return;var i1=cat.items.find(function(i){return i.id===id1});var i2=cat.items.find(function(i){return i.id===id2});if(!i1||!i2)return;var t=i1.order;i1.order=i2.order;i2.order=t;save(d);renderL2(catId)}
function showCatPicker(callback,excludeCatId){
  var data=load();
  var h='<div class="modal-header"><h2>选择分类</h2><button class="modal-close-btn" id="cpClose">&times;</button></div>';
  data.categories.forEach(function(cat){if(cat.id!==excludeCatId)h+='<div class="settings-item" id="cpick-'+cat.id+'" style="cursor:pointer"><span>'+escHtml(cat.name)+'</span><span style="color:#888;font-size:12px">'+(cat.items?cat.items.length:0)+' 项</span></div>'});
  if(data.categories.filter(function(c){return c.id!==excludeCatId}).length===0)h+='<p style="color:#888;text-align:center;padding:20px">暂无其他分类</p>';
  h+='<button class="btn-sm" id="cpNewCat" style="width:100%;margin-top:8px">+ 新建分类</button>';
  document.getElementById('settingsContent').innerHTML=h;
  document.getElementById('settingsModal').classList.add('open');
  document.getElementById('cpClose').onclick=function(){document.getElementById('settingsModal').classList.remove('open')};
  data.categories.forEach(function(cat){if(cat.id!==excludeCatId)document.getElementById('cpick-'+cat.id).onclick=function(){document.getElementById('settingsModal').classList.remove('open');callback(cat.id)}});
  document.getElementById('cpNewCat').onclick=function(){
    var name=prompt('输入新分类名称');
    if(!name||!name.trim())return;
    var d=load();
    d.categories.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name.trim(),order:d.categories.length,items:[]});
    save(d);renderL1();
    document.getElementById('settingsModal').classList.remove('open');
    callback(d.categories[d.categories.length-1].id);
  }
}
function moveItemToCategory(srcCatId,itemId,tgtCatId){
  var d=load();
  var src=d.categories.find(function(c){return c.id===srcCatId});
  var tgt=d.categories.find(function(c){return c.id===tgtCatId});
  if(!src||!tgt||srcCatId===tgtCatId)return;
  var idx=src.items.findIndex(function(i){return i.id===itemId});
  if(idx<0){toast('项目不存在');return}
  var item=src.items.splice(idx,1)[0];
  item.order=tgt.items.length;
  tgt.items.push(item);save(d);
  renderL2(srcCatId);
  currentCatId=tgtCatId;
  renderL2(tgtCatId);goTo(pageL2,tgt.name,true);addBtn.classList.add('visible');
  toast('已移动至: '+tgt.name);
}

// ==================== L2: Items ====================
var favTagFilter=null;
function renderL2(catId){
  var cat=findCat(catId);if(!cat)return;
  cat.items.sort(function(a,b){return a.order-b.order});
  // Tag filter bar for favorites
  var oldTagBar=document.getElementById('favTagBar');if(oldTagBar)oldTagBar.remove();
  if(catId===FAV_CAT_ID&&cat.items.length>0){
    var allTags={};
    cat.items.forEach(function(i){if(i.tags){i.tags.forEach(function(t){allTags[t]=(allTags[t]||0)+1})}});
    var tagKeys=Object.keys(allTags);
    if(tagKeys.length>0){
      var tb=document.createElement('div');tb.id='favTagBar';tb.style.cssText='display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;margin-bottom:12px;padding-bottom:4px;-webkit-overflow-scrolling:touch';
      tb.innerHTML='<div class="fav-tag-all" style="font-size:12px;padding:4px 12px;border-radius:12px;cursor:pointer;white-space:nowrap;'+(favTagFilter?'background:#3a3a5a;color:#aaa':'background:#7c8aff;color:#fff')+'">全部('+cat.items.length+')</div>';
      tagKeys.forEach(function(t){
        tb.innerHTML+='<div class="fav-tag" style="font-size:12px;padding:4px 12px;border-radius:12px;cursor:pointer;white-space:nowrap;'+(favTagFilter===t?'background:#7c8aff;color:#fff':'background:#3a3a5a;color:#aaa')+'">'+escHtml(t)+'('+allTags[t]+')</div>';
      });
      itemGrid.parentNode.insertBefore(tb,itemGrid);
      tb.querySelector('.fav-tag-all').addEventListener('click',function(){favTagFilter=null;renderL2(catId)});
      tb.querySelectorAll('.fav-tag').forEach(function(el){
        el.addEventListener('click',function(){favTagFilter=this.textContent.replace(/\(\d+\)/,'');renderL2(catId)});
      });
    }
  }
  itemGrid.innerHTML='';
  // Filter by tag if active
  var items=cat.items;
  if(favTagFilter&&catId===FAV_CAT_ID){
    items=cat.items.filter(function(i){return i.tags&&i.tags.indexOf(favTagFilter)>=0});
  }
  // Single item: 1 column centered; multiple: 2 columns
  itemGrid.style.gridTemplateColumns=items.length===1?'1fr':'1fr 1fr';
  itemGrid.style.maxWidth=items.length===1?'200px':'';itemGrid.style.margin=items.length===1?'0 auto':'';
  var data=load();var catIdx=data.categories.findIndex(function(c){return c.id===catId});
  if(catIdx<0)catIdx=0;
  var catHue=catIdx*Math.floor(360/Math.max(data.categories.length,1));

  items.forEach(function(item,i){
    var card=document.createElement('div');
    card.className='item-card';
    card.style.backgroundColor=itemColor(catHue,i,items.length);
    var extras='';if(item.tags&&item.tags.length>0)extras=' <span style="font-size:10px;color:rgba(255,255,255,.4)">#'+item.tags.join(' #')+'</span>';
    card.innerHTML='<div class="item-name">'+escHtml(item.name)+'</div><div class="item-meta">'+(item.text?item.text.length:0)+' 字'+extras+'</div>';
    card.setAttribute('data-iid',item.id);
    card.setAttribute('data-cid',catId);

    // Tap + long-press drag
    var touchStartTime=0,touchMoved=false;
    var lp;
    card.addEventListener('touchstart',function(e){touchStartTime=Date.now();touchMoved=false;lp=setTimeout(function(){startDrag(card,catId,e,item.id)},500)},{passive:false});
    card.addEventListener('touchend',function(){clearTimeout(lp);if(!touchMoved&&Date.now()-touchStartTime<400&&!card.classList.contains('dragging')){currentItemId=item.id;renderL3(catId,item.id);goTo(pageL3,item.name,true)}});
    card.addEventListener('touchmove',function(){clearTimeout(lp);touchMoved=true});
    itemGrid.appendChild(card);
  });

  // "+" button: create new item
  addBtn.onclick=function(){showItemEditor(catId,null)};
}

    }else{

      if(tagsIn===null)return;
      var tags=tagsIn.trim()?tagsIn.split(/[,，]/).map(function(t){return t.trim()}).filter(function(t){return t}):[];
      toggleFavItem(catId,itemId,cat.name,item.name,item.text,tags);

  genQR(item.text,Math.min(window.innerWidth*0.8,500),function(c){if(c)document.getElementById('qrWhite').appendChild(c)});

    renderL2(catId);goTo(pageL2,cat.name,true);addBtn.classList.add('visible');toast('已删除');
  };
  var hb=document.getElementById('historyBtn');
  if(item._history&&item._history.length>0){
    hb.style.display='inline-block';
    hb.onclick=function(){showVersionHistory(catId,itemId)};
  }else{hb.style.display='none'}
}

function showVersionHistory(catId,itemId){
  var cat=findCat(catId);var item=findItem(cat,itemId);if(!item||!item._history)return;
  var h='<div class="modal-header"><h2>历史版本</h2><button class="modal-close-btn" id="histClose">&times;</button></div>';
  h+='<div style="color:#888;font-size:11px;margin:0 0 8px 0">保留最近3个版本</div>';
  item._history.forEach(function(v,i){
    var d=new Date(v.ts);
    var ds=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
    h+='<div class="settings-item hist-ver" data-vidx="'+i+'" style="cursor:pointer;flex-direction:column;align-items:flex-start;gap:2px">';
    h+='<span style="font-size:12px;color:#aaa">版本'+(item._history.length-i)+' — '+ds+'</span>';
    h+='<span style="font-size:13px;color:#e0e0e0">'+escHtml(v.text.substring(0,60))+(v.text.length>60?'...':'')+'</span>';
    h+='<span style="font-size:11px;color:#666">'+v.text.length+' 字</span></div>';
  });
  h+='<button class="btn-sm danger" id="histClearAll" style="width:100%;margin-top:8px">清除所有历史版本</button>';
  document.getElementById('settingsContent').innerHTML=h;
  document.getElementById('settingsModal').classList.add('open');
  document.getElementById('histClose').onclick=function(){document.getElementById('settingsModal').classList.remove('open')};
  document.querySelectorAll('.hist-ver').forEach(function(el){
    el.addEventListener('click',function(){
      var vi=parseInt(this.dataset.vidx);
      var v=item._history[vi];
      var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});if(ci<0)return;
      var it=findItem(d.categories[ci],itemId);if(!it)return;
      // Archive current before revert
      if(!it._history)it._history=[];
      it._history.unshift({text:it.text,ts:Date.now()});if(it._history.length>3)it._history.length=3;
      it.text=v.text;
      save(d);document.getElementById('settingsModal').classList.remove('open');
      renderL3(catId,itemId);toast('已恢复至版本'+(item._history.length-vi));
    });
  });
  document.getElementById('histClearAll').onclick=function(){
    if(!confirm('确定清除所有历史版本？此操作不可撤销。'))return;
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});if(ci<0)return;
    var it=findItem(d.categories[ci],itemId);if(it)it._history=[];
    save(d);document.getElementById('settingsModal').classList.remove('open');
    renderL3(catId,itemId);toast('已清除版本历史');
  };
}

// ==================== Item Editor (inline modal) ====================
function showItemEditor(catId,itemId,prefillText){
  var cat=findCat(catId);var item=itemId?findItem(cat,itemId):null;
  var isNew=!item;
  var title=isNew?'新增子类':'编辑: '+(item?item.name:'');

  var h='<div class="modal-header"><h2>'+escHtml(title)+'</h2><button class="modal-close-btn" id="editorClose">&times;</button></div>';
  h+='<div class="editor-label">名称</div>';
  h+='<input type="text" class="editor-input" id="editorName" value="'+escHtml(item?item.name:'')+'" placeholder="子类名称">';
  h+='<div class="editor-label">文本内容</div>';
  h+='<textarea class="editor-textarea" id="editorText" placeholder="输入文本内容...">'+escHtml(item?item.text:(prefillText||''))+'</textarea>';
  h+='<div style="margin-top:16px"><button class="btn" id="editorSave">保存</button></div>';
  if(!isNew){h+='<div style="margin-top:8px"><button class="btn-sm danger" id="editorDeleteItem" style="width:100%">删除此子类</button></div>'}

  document.getElementById('settingsContent').innerHTML=h;
  document.getElementById('settingsModal').classList.add('open');

  document.getElementById('editorClose').onclick=function(){document.getElementById('settingsModal').classList.remove('open')};
  document.getElementById('editorSave').onclick=function(){
    var name=document.getElementById('editorName').value.trim();
    var text=document.getElementById('editorText').value.trim();
    if(!name){toast('请输入名称');return}
    if(!text){toast('请输入文本内容');return}
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});
    if(ci<0){toast('分类不存在');return}
    if(isNew){
      d.categories[ci].items.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name,text:text,order:d.categories[ci].items.length});
      currentCatId=catId;
    }else{
      var it=findItem(d.categories[ci],itemId);if(it){
        if(it.text!==text){
          if(!it._history)it._history=[];
          it._history.unshift({text:it.text,ts:Date.now()});
          if(it._history.length>3)it._history.length=3;
        }
        it.name=name;it.text=text;
      }
    }
    save(d);
    document.getElementById('settingsModal').classList.remove('open');
    renderL2(catId);
    if(pageL1.classList.contains('active')){renderL1();goTo(pageL1,'病历书写助手',false);addBtn.classList.add('visible')}
    else if(!pageL2.classList.contains('active')){goTo(pageL2,d.categories[ci].name,true);addBtn.classList.add('visible');isSearchMode=false}
    toast(isNew?'已添加: '+name:'已更新');

var LOGIN_KEY='qrlib_login_v1';

function hashStr(s){
  var h=0,i;for(i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return 'sha2_'+Math.abs(h).toString(36)+'_'+s.length.toString(36);
}

function getLoginData(){
  try{return JSON.parse(localStorage.getItem(LOGIN_KEY))||{}}catch(e){return{}}
}

function saveLoginData(d){localStorage.setItem(LOGIN_KEY,JSON.stringify(d))}

function isFirstRun(){var d=getLoginData();return !d.user||!d.passHash}

function checkLogin(user,pass){
  var d=getLoginData();
  return d.user===user && d.passHash===hashStr(pass);
}

function setupLogin(user,pass){
  saveLoginData({user:user,passHash:hashStr(pass)});
  sessionStorage.setItem(SESSION_KEY,'1');
  enterMainApp();
}

function doLogin(user,pass){
  if(checkLogin(user,pass)){
    sessionStorage.setItem(SESSION_KEY,'1');
    enterMainApp();
  }else{
    document.getElementById('loginError').textContent='账户名或密码错误，请重试';
    document.getElementById('loginUser').classList.add('error');

}

// ==================== Temp: Split & QR ====================
function splitText(text,maxLen){maxLen=maxLen||200;var chunks=[];var remain=text;while(remain.length>maxLen){var cut=maxLen;var p=remain.lastIndexOf('。',maxLen);if(p>maxLen*0.5)cut=p+1;else{var s=remain.lastIndexOf('；',maxLen);if(s>maxLen*0.5)cut=s+1;else{var n=remain.lastIndexOf('\n',maxLen);if(n>maxLen*0.5)cut=n+1}}chunks.push(remain.slice(0,cut).trim());remain=remain.slice(cut).trim()}if(remain)chunks.push(remain);return chunks}

function normalizeText(t){
  // Merge consecutive blank lines (>2 -> 1)
  t=t.replace(/\n{3,}/g,'\n\n');
  // Trim trailing whitespace on each line
  t=t.split('\n').map(function(l){return l.trim()}).join('\n');
  // Half-width to full-width punctuation
  t=t.replace(/,/g,'，').replace(/\./g,'。').replace(/;/g,'；')
     .replace(/:/g,'：').replace(/!/g,'！').replace(/\?/g,'？')
     .replace(/\(/g,'（').replace(/\)/g,'）');
  // Normalize number-unit spacing: "38.5 ℃" -> "38.5℃"
  t=t.replace(/(\d)\s+(℃|°C|mg|g|mL|L|mm|cm|m|kg|h|d|min|s)/g,'$1$2');
  // Trim leading/trailing whitespace
  return t.trim();
}

function showPhotoOnCanvas(file,canvas,cb){
  if(window.createImageBitmap){
    createImageBitmap(file,{imageOrientation:'from-image'}).then(function(bmp){
      var maxW=Math.min(window.innerWidth-32,1200),maxH=600;
      var scale=Math.min(maxW/bmp.width,maxH/bmp.height,1);
      canvas.width=Math.round(bmp.width*scale);canvas.height=Math.round(bmp.height*scale);
      var ctx=canvas.getContext('2d');ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(bmp,0,0,canvas.width,canvas.height);
      canvas.style.display='block';if(cb)cb(canvas);
    }).catch(function(){fallbackShowPhoto(file,canvas,cb)});
  }else{fallbackShowPhoto(file,canvas,cb)}
}
function fallbackShowPhoto(file,canvas,cb){
  var img=new Image();
  img.onload=function(){
    var maxW=Math.min(window.innerWidth-32,1200),maxH=600;
    var scale=Math.min(maxW/img.width,maxH/img.height,1);
    canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
    var ctx=canvas.getContext('2d');ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    canvas.style.display='block';if(cb)cb(canvas);
  };
  img.onerror=function(){toast('\u56fe\u7247\u52a0\u8f7d\u5931\u8d25')};
  img.src=URL.createObjectURL(file);
}

  function handleFile(file){if(file)showPhoto(file)}

  document.getElementById('btnOcr').addEventListener('click',function(){
    tempLastInput='ocr';goTo(document.getElementById('page-temp-ocr'),'\u62cd\u7167\u8bc6\u522b',true);cameraInp.click();
  });

  });
  document.getElementById('ocrPaste').addEventListener('click',function(){
    navigator.clipboard.readText().then(function(t){
      if(t.trim()){editor.value=t;toast('\u5df2\u7c98\u8d34 '+t.length+'\u5b57')}else{toast('\u526a\u8d34\u677f\u4e3a\u7a7a')}
    }).catch(function(){toast('\u65e0\u6cd5\u8bbf\u95ee\u526a\u8d34\u677f\uff0c\u8bf7\u624b\u52a8\u957f\u6309\u7c98\u8d34')});
  });
  document.getElementById('ocrNormalize').addEventListener('click',function(){
    var txt=editor.value;if(!txt.trim()){toast('\u65e0\u6587\u5b57\u53ef\u89c4\u8303\u5316');return}
    editor.value=normalizeText(txt);toast('\u5df2\u89c4\u8303\u5316');
  });
  document.getElementById('ocrGenerate').addEventListener('click',function(){
    var txt=editor.value.trim();if(!txt){toast('\u8bf7\u5148\u7c98\u8d34\u6216\u624b\u52a8\u8f93\u5165\u6587\u5b57');return}
    var chunks=splitText(txt);renderTempQR(chunks,txt);goTo(document.getElementById('page-temp-qr'),'\u4e34\u65f6\u4e8c\u7ef4\u7801',true);
  });
  // Tesseract.js OCR for non-iOS platforms
  if(!detectIOS()){
    var autoBtn=document.getElementById('ocrAutoBtn');
    autoBtn.style.display='inline-block';
    autoBtn.addEventListener('click',function(){
      if(!canvas.width){toast('\u8bf7\u5148\u62cd\u7167');return}
      autoBtn.textContent='\u52a0\u8f7d\u4e2d...';autoBtn.disabled=true;
      loadTesseract(function(T){
        autoBtn.textContent='\u8bc6\u522b\u4e2d...';
        T.recognize(canvas,'chi_sim+eng').then(function(r){
          editor.value=r.data.text;autoBtn.textContent='\u81ea\u52a8\u8bc6\u522b';autoBtn.disabled=false;
          toast('\u8bc6\u522b\u5b8c\u6210: '+r.data.text.length+' \u5b57');
        }).catch(function(e){
          autoBtn.textContent='\u81ea\u52a8\u8bc6\u522b';autoBtn.disabled=false;
          toast('\u8bc6\u522b\u5931\u8d25\uff0c\u8bf7\u91cd\u8bd5');
        });
      });
    });
  }
}

function detectIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
}

function loadTesseract(cb){
  if(window.Tesseract){cb(window.Tesseract);return}
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
  s.onload=function(){toast('OCR\u5f15\u64ce\u5df2\u5c31\u7eea');cb(window.Tesseract)};
  s.onerror=function(){toast('OCR\u5f15\u64ce\u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u7f51\u7edc');document.getElementById('ocrAutoBtn').disabled=false;document.getElementById('ocrAutoBtn').textContent='\u81ea\u52a8\u8bc6\u522b'};
  document.head.appendChild(s);
}

var recognition=null,voiceActive=false,voiceFinal='';
function initTempVoice(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var btn=document.getElementById('voiceBtn');var status=document.getElementById('voiceStatus');var editor=document.getElementById('voiceEditor');
  document.getElementById('btnVoice').addEventListener('click',function(){
    tempLastInput='voice';goTo(document.getElementById('page-temp-voice'),'语音输入',true);
  });
  if(!SR){
    btn.style.display='none';status.textContent='请使用键盘麦克风按钮进行语音输入';
    editor.placeholder='点击键盘上的麦克风按钮开始语音输入...';return;
  }
  recognition=new SR();recognition.lang='zh-CN';recognition.interimResults=true;recognition.continuous=true;
  recognition.onresult=function(e){var t='';for(var i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;editor.value=t;voiceFinal=t};
  recognition.onerror=function(e){if(e.error!=='no-speech'&&e.error!=='aborted')toast('语音识别错误: '+e.error);stopVoiceUI()};
  recognition.onend=function(){if(voiceActive){try{recognition.start()}catch(e){stopVoiceUI()}}};
  btn.addEventListener('click',function(){
    if(!voiceActive){voiceActive=true;voiceFinal='';editor.value='';btn.classList.add('recording','voice-pulse');status.textContent='正在聆听... 点击停止';try{recognition.start()}catch(e){toast('语音启动失败');stopVoiceUI()}}
    else{recognition.stop();stopVoiceUI()}
  });
  document.getElementById('voiceClear').addEventListener('click',function(){editor.value='';voiceFinal='';status.textContent='已清除，点击重新录音'});
  document.getElementById('voiceNormalize').addEventListener('click',function(){
    var txt=editor.value;if(!txt.trim()){toast('无文字可规范化');return}
    editor.value=normalizeText(txt);toast('已规范化');
  });
  document.getElementById('voiceGenerate').addEventListener('click',function(){
    var txt=editor.value.trim();if(!txt){toast('请先录音或手动输入文字');return}
    var chunks=splitText(txt);renderTempQR(chunks,txt);goTo(document.getElementById('page-temp-qr'),'临时二维码',true);
  });
}
function stopVoiceUI(){voiceActive=false;var btn=document.getElementById('voiceBtn');btn.classList.remove('recording','voice-pulse');document.getElementById('voiceStatus').textContent='点击开始录音'}

// ==================== Auto-advance Timer ====================
var autoAdvanceTimer=null,autoAdvanceActive=false;
function stopAutoAdvance(){autoAdvanceActive=false;if(autoAdvanceTimer){clearTimeout(autoAdvanceTimer);autoAdvanceTimer=null}}
document.getElementById('autoAdvanceToggle').addEventListener('click',function(){
  if(autoAdvanceActive){stopAutoAdvance();this.classList.remove('on');document.getElementById('autoAdvanceLabel').textContent='扫码后自动切换下一张'}
  else{autoAdvanceActive=true;this.classList.add('on');document.getElementById('autoAdvanceLabel').textContent='自动切换中... 点击停止';advanceLoop()}
});
function advanceLoop(){
  if(!autoAdvanceActive)return;
  autoAdvanceTimer=setTimeout(function(){
    if(tempChunkIdx<tempChunks.length-1){tempChunkIdx++;showTempChunk();advanceLoop()}
    else{stopAutoAdvance();document.getElementById('autoAdvanceToggle').classList.remove('on');document.getElementById('autoAdvanceLabel').textContent='已完成全部切换'}
  },4000);
}

// ==================== PIN Lock ====================
var pinInput='',pinStep='verify',pinSaved='',pinConfirm='';
var savedPin=localStorage.getItem(PIN_KEY);
if(!savedPin){
  pinStep='setup';document.getElementById('pinTitle').textContent='设置访问密码';
  document.getElementById('pinSub').textContent='输入4位数字密码';
}else{pinSaved=savedPin}
function resetPinUI(){
  document.querySelectorAll('.pin-dot').forEach(function(d){d.classList.remove('filled')});
}
document.querySelectorAll('.pin-key').forEach(function(k){
  k.addEventListener('click',function(){
    var key=this.dataset.key;
    if(key==='del'){pinInput=pinInput.slice(0,-1);resetPinUI();for(var i=0;i<pinInput.length;i++)document.querySelectorAll('.pin-dot')[i].classList.add('filled');return}
    if(key==='ok'){
      if(pinStep==='change'){
        if(pinInput.length!==4){document.getElementById('pinSub').textContent='请输入4位数字';resetPinUI();return}
        if(pinInput!==pinSaved){pinInput='';resetPinUI();document.getElementById('pinSub').textContent='当前密码错误，请重试';return}
        pinStep='setup';pinInput='';pinConfirm='';pinSaved='';resetPinUI();
        document.getElementById('pinTitle').textContent='设置新密码';document.getElementById('pinSub').textContent='输入新的4位数字密码';return;
      }
      if(pinStep==='setup'){
        if(pinInput.length!==4){document.getElementById('pinSub').textContent='请输入4位数字';resetPinUI();return}
        if(!pinConfirm){pinConfirm=pinInput;resetPinUI();document.getElementById('pinTitle').textContent='确认访问密码';document.getElementById('pinSub').textContent='再次输入4位数字密码';return}
        if(pinInput!==pinConfirm){pinInput='';pinConfirm='';resetPinUI();document.getElementById('pinTitle').textContent='设置访问密码';document.getElementById('pinSub').textContent='两次密码不一致，重新输入';return}
        localStorage.setItem(PIN_KEY,pinInput);pinSaved=pinInput;
        document.getElementById('pinOverlay').classList.remove('active');toast('访问密码已设置');return;
      }
      if(pinInput===pinSaved){document.getElementById('pinOverlay').classList.remove('active')}
      else{pinInput='';document.getElementById('pinSub').textContent='密码错误，请重试';resetPinUI()}
      return;
    }
    if(pinInput.length>=4)return;
    pinInput+=key;resetPinUI();
    for(var i=0;i<pinInput.length;i++)document.querySelectorAll('.pin-dot')[i].classList.add('filled');
    if(pinInput.length===4&&pinStep==='setup'&&pinConfirm){setTimeout(function(){document.querySelector('.pin-key[data-key="ok"]').click()},200)}
  });
});

var fileImportInput=document.createElement('input');
fileImportInput.type='file';fileImportInput.accept='.txt,.json,.pdf,text/*';fileImportInput.style.display='none';
document.body.appendChild(fileImportInput);
fileImportInput.addEventListener('change',function(){
  var file=this.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var txt=e.target.result;if(!txt.trim()){toast('文件为空');return}
    // Check for batch delimiter
    var parts=txt.split(/\n\s*[-—]{3,}\s*\n|\n\s*#{3,}\s*\n/);
    if(parts.length>1){
      parts=parts.map(function(p){return p.trim()}).filter(function(p){return p.length>0});
      showBatchImportModal(parts);
      return;
    }
    var MAX_PREVIEW=2000;
    if(txt.length<=MAX_PREVIEW){
      var editor=document.getElementById('ocrEditor');
      editor.value=txt;toast('已加载: '+txt.length+'字');
      goTo(document.getElementById('page-temp-ocr'),'文件导入',true);
    }else{
      var chunks=splitText(txt);tempLastInput='file';
      renderTempQR(chunks,txt);goTo(document.getElementById('page-temp-qr'),'文件导入',true);
      toast('共 '+txt.length+' 字 → '+chunks.length+' 个QR码');
    }
  };
  reader.readAsText(file);
});

function showBatchImportModal(parts){
  var d=load();if(d.categories.length===0){toast('请先创建分类');return}
  var h='<div class="modal-header"><h2>批量导入 '+parts.length+' 个模板</h2><button class="modal-close-btn" id="batchClose">&times;</button></div>';
  h+='<div style="margin-bottom:8px;color:#888;font-size:12px">选择目标分类：</div>';
  d.categories.forEach(function(cat){
    h+='<div class="settings-item batch-cat-sel" data-cid="'+cat.id+'" style="cursor:pointer"><span>'+escHtml(cat.name)+'</span><span style="color:#888;font-size:12px">'+(cat.items?cat.items.length:0)+' 项</span></div>';
  });
  h+='<div class="settings-item batch-cat-sel" data-cid="__new__" style="cursor:pointer;border:dashed 1px #555"><span>+ 新建分类</span></div>';
  h+='<div class="batch-target-hint" style="color:#7c8aff;font-size:12px;margin:4px 0;display:none" id="batchHint">请先选择目标分类</div>';
  h+='<div style="max-height:280px;overflow-y:auto;margin-top:8px">';
  parts.forEach(function(p,i){
    var firstLine=p.split('\n')[0].substring(0,40);
    h+='<label class="settings-item" style="display:flex;align-items:flex-start;gap:8px;cursor:pointer">';
    h+='<input type="checkbox" class="batch-check" data-idx="'+i+'" checked style="margin-top:6px;flex-shrink:0">';
    h+='<div style="min-width:0"><div style="font-size:13px;color:#e0e0e0">'+escHtml(firstLine)+'</div><div style="font-size:11px;color:#888">'+p.length+' 字</div></div>';
    h+='</label>';
  });
  h+='</div>';
  h+='<button class="btn" id="batchCreateBtn" style="width:100%;margin-top:12px;background:#7c8aff">批量创建</button>';
  document.getElementById('settingsContent').innerHTML=h;
  document.getElementById('settingsModal').classList.add('open');
  var selectedCatId=null;
  document.getElementById('batchClose').onclick=function(){document.getElementById('settingsModal').classList.remove('open')};
  document.querySelectorAll('.batch-cat-sel').forEach(function(el){
    el.addEventListener('click',function(){
      document.querySelectorAll('.batch-cat-sel').forEach(function(e){e.style.background=''});
      el.style.background='rgba(124,138,255,.2)';
      if(this.dataset.cid==='__new__'){
        var name=prompt('输入新分类名称');if(!name||!name.trim())return;
        var nd=load();nd.categories.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name.trim(),order:nd.categories.length,items:[]});
        save(nd);selectedCatId=nd.categories[nd.categories.length-1].id;
      }else{selectedCatId=this.dataset.cid}
      document.getElementById('batchHint').style.display='none';
    });
  });
  document.getElementById('batchCreateBtn').addEventListener('click',function(){
    if(!selectedCatId){document.getElementById('batchHint').style.display='block';return}
    var selectedIdxs=[];
    document.querySelectorAll('.batch-check:checked').forEach(function(cb){selectedIdxs.push(parseInt(cb.dataset.idx))});
    if(selectedIdxs.length===0){toast('请至少选择一个模板');return}
    var nd=load();var cat=nd.categories.find(function(c){return c.id===selectedCatId});if(!cat)return;
    selectedIdxs.forEach(function(i){
      var p=parts[i];var firstLine=p.split('\n')[0].trim().substring(0,60);
      cat.items.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6)+'_'+i,name:firstLine,text:p,order:cat.items.length});
    });
    save(nd);document.getElementById('settingsModal').classList.remove('open');
    renderL1();toast('已批量导入 '+selectedIdxs.length+' 个模板');
  });
}

// ==================== Built-in Search ====================
(function(){
var searchCancel=document.getElementById('searchCancel');
var nameSearchInput=document.getElementById('nameSearchInput');
var contentSearchInput=document.getElementById('contentSearchInput');
var searchWrap=document.getElementById('searchWrap');
var navSearchBtn=document.getElementById('navSearchBtn');
var searchResults=[];
var lastSearchQuery='';
var lastContentQuery='';

window._searchRerun=function(){
  if(lastSearchQuery||lastContentQuery){
    searchWrap.classList.add('open');
    nameSearchInput.value=lastSearchQuery||'';
    contentSearchInput.value=lastContentQuery||'';
    if(lastSearchQuery)doSearch(lastSearchQuery);
    if(lastContentQuery)doContentSearch(lastContentQuery);
  }
};

window._clearSearch=function(){
  searchWrap.classList.remove('open');
  nameSearchInput.value='';
  contentSearchInput.value='';
  searchResults=[];
  lastSearchQuery='';
  lastContentQuery='';
  isSearchMode=false;
};

function doSearch(q){
  if(!q){searchResults=[];lastSearchQuery='';renderSearchMode();return}
  lastSearchQuery=q;
  var data=load();
  searchResults=[];
  data.categories.forEach(function(cat){
    cat.items.forEach(function(item){
      if(item.name.toLowerCase().indexOf(q.toLowerCase())!==-1){
        searchResults.push({catName:cat.name,catId:cat.id,itemId:item.id,itemName:item.name,text:item.text,source:'name'});
      }
    });
  });
  renderSearchResults(q,'名称');
}

function doContentSearch(q){
  if(!q){searchResults=[];lastContentQuery='';renderSearchMode();return}
  lastContentQuery=q;
  var data=load();
  searchResults=[];
  data.categories.forEach(function(cat){
    cat.items.forEach(function(item){
      var idx=item.text.toLowerCase().indexOf(q.toLowerCase());
      if(idx!==-1){
        var ctx=item.text.substring(Math.max(0,idx-12),Math.min(item.text.length,idx+q.length+12));
        if(idx>12)ctx='...'+ctx;
        if(idx+q.length+12<item.text.length)ctx=ctx+'...';
        searchResults.push({catName:cat.name,catId:cat.id,itemId:item.id,itemName:item.name,text:item.text,source:'content',context:ctx});
      }
    });
  });
  renderSearchResults(q,'内容');
}

function renderSearchMode(){
  var nq=nameSearchInput.value.trim();
  var cq=contentSearchInput.value.trim();
  var activeQ=nq||cq;
  if(!activeQ){
    window._clearSearch();
    if(currentCatId){renderL2(currentCatId);addBtn.classList.add('visible')}
    else{renderL1();goTo(pageL1,'病历书写助手',false);addBtn.classList.add('visible')}
    return;
  }
  isSearchMode=true;
  itemGrid.style.display='grid';
}

function renderSearchResults(q,type){
  if(searchResults.length===0){
    itemGrid.innerHTML='<div class="empty-state">未找到'+type+'包含 &quot;'+escHtml(q)+'&quot; 的模板</div>';
  }else{
    isSearchMode=true;
    itemGrid.innerHTML='';
    itemGrid.style.gridTemplateColumns=searchResults.length===1?'1fr':'1fr 1fr';
    itemGrid.style.maxWidth=searchResults.length===1?'200px':'';
    itemGrid.style.margin=searchResults.length===1?'0 auto':'';
    searchResults.forEach(function(r,idx){
      var card=document.createElement('div');card.className='item-card';
      card.style.backgroundColor='hsl(220,40%,35%)';
      card.setAttribute('data-sidx',idx);
      var nameEl=document.createElement('div');nameEl.className='item-name';nameEl.textContent=r.itemName;
      var metaEl=document.createElement('div');metaEl.className='item-meta';
      metaEl.textContent=r.catName+' · '+r.text.length+'字'+(r.context?' · '+escHtml(r.context):'');
      card.appendChild(nameEl);card.appendChild(metaEl);
      itemGrid.appendChild(card);
    });
    addBtn.classList.remove('visible');
  }
}

navSearchBtn.addEventListener('click',function(){
  if(pageL1.classList.contains('active')){
    goTo(pageL2,'搜索模板',true);
    addBtn.classList.remove('visible');
    isSearchMode=true;
  }
  searchWrap.classList.add('open');
  nameSearchInput.focus();
  if(lastSearchQuery){nameSearchInput.value=lastSearchQuery;doSearch(lastSearchQuery)}
  if(lastContentQuery){contentSearchInput.value=lastContentQuery;doContentSearch(lastContentQuery)}
});

searchCancel.addEventListener('click',function(){
  window._clearSearch();
  if(currentCatId){renderL2(currentCatId);addBtn.classList.add('visible')}
  else{renderL1();goTo(pageL1,'病历书写助手',false);addBtn.classList.add('visible')}
});

nameSearchInput.addEventListener('input',function(){
  doSearch(this.value.trim());
});
contentSearchInput.addEventListener('input',function(){
  doContentSearch(this.value.trim());
});

// Click handler for search results (delegated on itemGrid)
itemGrid.addEventListener('click',function(e){
  var card=e.target.closest('.item-card');
  if(!card||!isSearchMode)return;
  var idx=parseInt(card.getAttribute('data-sidx'));
  if(isNaN(idx)||idx>=searchResults.length)return;
  var r=searchResults[idx];
  currentCatId=r.catId;currentItemId=r.itemId;
  renderL3(r.catId,r.itemId);goTo(pageL3,r.itemName,true);
});
})();
