<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QR文本库">
<meta name="theme-color" content="#0f0f1a">
<title>QR 文本库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;min-height:-webkit-fill-available;user-select:none;-webkit-user-select:none;overflow-x:hidden}

.nav{display:flex;align-items:center;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px 16px;background:#1a1a2e;position:sticky;top:0;z-index:10;gap:12px;border-bottom:1px solid #2a2a4a}
.nav-back{width:32px;height:32px;border-radius:50%;background:#2a2a4a;border:none;color:#ccc;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.nav-back.visible{display:flex}
.nav-title{font-size:16px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.page{display:none;padding:16px;padding-bottom:100px}
.page.active{display:block}

/* L1 */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-card{border-radius:16px;padding:24px 12px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;min-height:80px;display:flex;align-items:center;justify-content:center;position:relative}
.cat-card:active{transform:scale(.96)}
.cat-card.dragging{opacity:.85;transform:scale(1.05);z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.cat-card.drop-target{outline:3px dashed rgba(255,255,255,.6);outline-offset:2px}
.cat-name{font-size:15px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);line-height:1.3}
.cat-count{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}

.ghost{position:fixed;pointer-events:none;z-index:200;opacity:.9;transform:scale(1.08);box-shadow:0 12px 40px rgba(0,0,0,.6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff;text-align:center;padding:24px 12px;text-shadow:0 1px 2px rgba(0,0,0,.3)}

/* L2 */
.l2-wrapper{display:flex;flex-direction:column;min-height:calc(100vh - 150px);justify-content:center}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:center}
.item-card{border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:transform .15s;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.item-card:active{transform:scale(.96)}
.item-name{font-size:14px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.item-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}

/* L3 */
.qr-container{display:flex;flex-direction:column;align-items:center;padding-top:20px}
.qr-white{background:#fff;border-radius:16px;padding:16px;display:inline-block}
.qr-white canvas{display:block;max-width:82vw;max-height:58vh}
.l3-meta{text-align:center;margin-top:20px;color:#888;font-size:14px}
.l3-actions{display:flex;gap:12px;margin-top:20px;width:100%;max-width:340px}
.btn-outline{flex:1;padding:12px;background:transparent;border:1px solid #444;border-radius:10px;color:#ccc;font-size:14px;cursor:pointer;text-align:center;transition:border-color .2s}
.btn-outline:active{border-color:#7c8aff}
.btn-danger{flex:1;padding:12px;background:transparent;border:1px solid #5a1a1a;border-radius:10px;color:#e74c3c;font-size:14px;cursor:pointer;text-align:center}

/* Floating buttons */
.float-btn{border-radius:50%;background:#2a2a4a;border:1px solid #3a3a5a;color:#aaa;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);transition:all .2s}
.float-btn:active{background:#3a3a5a;transform:scale(.95)}
.settings-btn{position:fixed;bottom:24px;right:24px;width:48px;height:48px;font-size:22px}
.add-btn{position:fixed;bottom:24px;left:24px;width:48px;height:48px;font-size:28px;display:none}
.add-btn.visible{display:flex}

/* Settings modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:150;overflow-y:auto}
.modal-overlay.open{display:block}
.modal-content{background:#1a1a2e;margin:20px;border-radius:16px;padding:20px;min-height:calc(100vh - 40px)}
.modal-header{display:flex;align-items:center;margin-bottom:16px}
.modal-header h2{flex:1;font-size:18px}
.modal-close-btn{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:8px}
.section-title{font-size:13px;color:#666;letter-spacing:1px;margin:20px 0 8px}
.settings-list{}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 12px;background:#1a1a2e;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.settings-item:active{background:#252540}
.settings-item .si-name{font-size:15px;color:#e0e0e0}
.settings-item .si-meta{font-size:12px;color:#666}
.settings-item .si-arrow{color:#555;font-size:16px}

/* Settings - item editor */
.editor-label{font-size:12px;color:#888;margin:12px 0 4px}
.editor-input{width:100%;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:10px;color:#e0e0e0;font-size:15px;outline:none;margin-bottom:4px}
.editor-input:focus{border-color:#7c8aff}
.editor-textarea{width:100%;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:10px;color:#e0e0e0;font-size:14px;min-height:140px;resize:vertical;outline:none;line-height:1.6}
.editor-textarea:focus{border-color:#7c8aff}

.btn{padding:10px 0;background:#7c8aff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;display:block;width:100%}
.btn:active{opacity:.8}
.btn-sm{padding:8px 18px;background:#7c8aff;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-sm.danger{background:#c0392b}
.btn-sm.secondary{background:#444}
.btn-sm:active{opacity:.7}

.empty-state{text-align:center;color:#555;padding:60px 20px;font-size:15px;line-height:1.8}

.l3-privacy{text-align:center;margin-top:16px;color:#555;font-size:12px;line-height:1.6;max-width:300px;white-space:pre-line}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#7c8aff;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Temp input section */
.temp-section{padding:0 0 16px 0}
.temp-label{font-size:13px;color:#666;letter-spacing:1px;margin-bottom:10px}
.temp-buttons{display:flex;gap:12px}
.temp-btn{flex:1;border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:transform .15s;border:none;background:#1e1e3a;color:#ccc;font-size:13px;font-weight:600}
.temp-btn:active{transform:scale(.96)}
.temp-btn-icon{font-size:32px;display:block;margin-bottom:6px}

/* OCR preview & progress */
.ocr-preview{width:100%;max-height:200px;object-fit:contain;border-radius:12px;margin-bottom:12px;display:none}
.ocr-progress{text-align:center;color:#7c8aff;font-size:14px;padding:20px;display:none}
.ocr-progress .spinner{display:inline-block;width:24px;height:24px;border:3px solid #333;border-top-color:#7c8aff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Voice recording */
.voice-control{display:flex;flex-direction:column;align-items:center;padding:30px 0}
.voice-btn{width:80px;height:80px;border-radius:50%;border:3px solid #444;background:#1e1e3a;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;transition:all .2s}
.voice-btn.recording{border-color:#e74c3c;box-shadow:0 0 0 8px rgba(231,76,60,.2)}
.voice-pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}70%{box-shadow:0 0 0 16px rgba(231,76,60,0)}100%{box-shadow:0 0 0 0 rgba(231,76,60,0)}}
.voice-status{color:#888;font-size:13px;margin-top:14px}

/* Text editor (shared by OCR & voice) */
.temp-editor{width:100%;min-height:120px;padding:12px;background:#0f0f1a;border:1px solid #333;border-radius:12px;color:#e0e0e0;font-size:14px;resize:vertical;outline:none;line-height:1.7;margin-bottom:12px}
.temp-editor:focus{border-color:#7c8aff}
.temp-actions{display:flex;gap:12px}
.temp-actions .btn{flex:1}

/* Split QR nav */
.split-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
.split-nav-btn{width:40px;height:40px;border-radius:50%;background:#2a2a4a;border:1px solid #3a3a5a;color:#ccc;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.split-nav-btn:disabled{opacity:.3}
.split-indicator{color:#888;font-size:14px;min-width:60px;text-align:center}
</style>
</head>
<body>

<div class="nav" id="nav">
  <button class="nav-back" id="navBack">&#x2039;</button>
  <div class="nav-title" id="navTitle">QR 文本库</div>
</div>

<!-- L1 -->
<div class="page active" id="page-l1">
  <div class="cat-grid" id="catGrid"></div>
  <div class="empty-state" id="l1Empty" style="display:none">还没有分类<br>点击右下角 ⚙ → 载入预设模板</div>
</div>

<!-- L2 -->
<div class="page" id="page-l2">
  <div class="l2-wrapper"><div class="item-grid" id="itemGrid"></div></div>
</div>

<!-- L3 -->
<div class="page" id="page-l3">
  <div class="qr-container">
    <div class="qr-white" id="qrWhite"></div>
    <div class="l3-meta" id="l3Meta"></div>
    <div class="l3-actions">
      <button class="btn-outline" id="editItemBtn">编辑文本</button>
      <button class="btn-danger" id="deleteItemBtn">删除</button>
    </div>
    <div class="l3-privacy" id="l3PrivacyHint"></div>
  </div>
</div>

<!-- Disclaimer modal -->
<div class="modal-overlay" id="disclaimerModal">
  <div class="modal-content" style="display:flex;flex-direction:column;justify-content:center;text-align:center">
    <h2 style="font-size:18px;margin-bottom:16px">使用须知</h2>
    <p style="font-size:14px;color:#aaa;line-height:1.8;text-align:left;margin-bottom:20px">
      本工具为临床医疗文书模板管理助手，旨在协助执业医师提高电子病历录入效率。<br><br>
      <strong>请勿在模板中包含患者身份信息</strong>（姓名、病历号、身份证号等）。<br>
      模板中的占位符（<code>___</code>）应在录入电子病历后替换为实际数值。<br>
      最终病历内容须由临床医生审核确认后录入医院信息系统。<br><br>
      本软件不涉及患者隐私数据的采集、传输或云端存储，所有数据仅保存在您的设备本地。
    </p>
    <button class="btn" id="disclaimerAccept">已知悉并同意</button>
  </div>
</div>

<button class="float-btn settings-btn" id="settingsBtn">&#x2699;</button>
<button class="float-btn add-btn" id="addBtn">+</button>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content" id="settingsContent"></div>
</div>

<div class="toast" id="toast"></div>

</script>
<script>
var STORAGE_KEY = 'qrlib_v2';

// ==================== Data ====================
function load(){
  try{var d=JSON.parse(localStorage.getItem(STORAGE_KEY));if(d&&d.categories)return d}catch(e){}
  return {categories:[]};
}
function save(data){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
function sortCats(data){data.categories.sort(function(a,b){return a.order-b.order})}
function findCat(id){var d=load();for(var i=0;i<d.categories.length;i++){if(d.categories[i].id===id)return d.categories[i]}return null}
function findItem(cat,id){for(var i=0;i<cat.items.length;i++){if(cat.items[i].id===id)return cat.items[i]}return null}

// ==================== Colors ====================
function catColor(index,total){var hue=(index*Math.floor(360/(total||1)))%360;return 'hsl('+hue+',58%,48%)'}
function itemColor(catHue,index,total){var hue=(catHue+index*Math.floor(360/(total||1)*0.4))%360;return 'hsl('+hue+',40%,42%)'}

// ==================== Toast ====================
var toastTimer;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show')},1800)}

// ==================== QR ====================
function genQR(text,size,cb){if(typeof QRCode==='undefined'){cb(null);return}var c=document.createElement('canvas');QRCode.toCanvas(c,text,{width:size||300,margin:2,color:{dark:'#000',light:'#fff'}},function(err){cb(err?null:c)})}

// ==================== Navigation ====================
var navBack=document.getElementById('navBack');
var navTitle=document.getElementById('navTitle');
var pageL1=document.getElementById('page-l1');
var pageL2=document.getElementById('page-l2');
var pageL3=document.getElementById('page-l3');
var catGrid=document.getElementById('catGrid');
var itemGrid=document.getElementById('itemGrid');
var l1Empty=document.getElementById('l1Empty');
var addBtn=document.getElementById('addBtn');
var currentCatId=null,currentItemId=null;
var isSearchMode=false;

function goTo(page,title,showBack){
  pageL1.classList.remove('active');pageL2.classList.remove('active');pageL3.classList.remove('active');
  page.classList.add('active');
  navTitle.textContent=title;
  if(showBack){navBack.classList.add('visible')}else{navBack.classList.remove('visible')}
  addBtn.classList.remove('visible');
}

navBack.addEventListener('click',function(){
  if(pageL3.classList.contains('active')){
    renderL2(currentCatId);
    goTo(pageL2,findCat(currentCatId).name,true);
    addBtn.classList.add('visible');
  }else if(pageL2.classList.contains('active')){
    if(isSearchMode){isSearchMode=false}
    renderL1();
    goTo(pageL1,'QR 文本库',false);
  }
});

// ==================== L1: Categories ====================
function renderL1(){
  var data=load();sortCats(data);
  catGrid.innerHTML='';
  if(data.categories.length===0){l1Empty.style.display='block';return}
  l1Empty.style.display='none';
  data.categories.forEach(function(cat,i){
    var card=document.createElement('div');
    card.className='cat-card';
    card.style.backgroundColor=catColor(i,data.categories.length);
    card.setAttribute('data-cid',cat.id);
    card.innerHTML='<div><div class="cat-name">'+escHtml(cat.name)+'</div><div class="cat-count">'+(cat.items?cat.items.length:0)+' 项</div></div>';
    card.addEventListener('click',function(e){if(card.classList.contains('dragging'))return;currentCatId=cat.id;renderL2(cat.id);goTo(pageL2,cat.name,true);addBtn.classList.add('visible');isSearchMode=false});
    var lp;card.addEventListener('touchstart',function(e){lp=setTimeout(function(){startDrag(card,cat.id,e)},500)},{passive:false});card.addEventListener('touchend',function(){clearTimeout(lp)});card.addEventListener('touchmove',function(){clearTimeout(lp)});
    catGrid.appendChild(card);
  });
}

// Drag-to-swap
var dragCard=null,dragCatId=null,ghost=null,offsetX=0,offsetY=0;
function startDrag(card,catId,e){dragCard=card;dragCatId=catId;card.classList.add('dragging');ghost=document.createElement('div');ghost.className='ghost';ghost.style.width=card.offsetWidth+'px';ghost.style.height=card.offsetHeight+'px';ghost.style.backgroundColor=card.style.backgroundColor;ghost.innerHTML=card.innerHTML;document.body.appendChild(ghost);var t=e.touches[0];var r=card.getBoundingClientRect();offsetX=t.clientX-r.left;offsetY=t.clientY-r.top;moveGhost(t.clientX,t.clientY)}
function moveGhost(x,y){if(!ghost)return;ghost.style.left=(x-offsetX)+'px';ghost.style.top=(y-offsetY)+'px'}
document.addEventListener('touchmove',function(e){if(!dragCard)return;e.preventDefault();var t=e.touches[0];moveGhost(t.clientX,t.clientY);document.querySelectorAll('.cat-card').forEach(function(c){c.classList.remove('drop-target');if(c===dragCard)return;var r=c.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){c.classList.add('drop-target')}})},{passive:false});
document.addEventListener('touchend',function(){if(!dragCard)return;var t=document.querySelector('.cat-card.drop-target');if(t){var tid=t.getAttribute('data-cid');swapCategories(dragCatId,tid)}dragCard.classList.remove('dragging');document.querySelectorAll('.cat-card').forEach(function(c){c.classList.remove('drop-target')});if(ghost){ghost.remove();ghost=null}dragCard=null;dragCatId=null});
function swapCategories(id1,id2){var d=load();var c1=d.categories.find(function(c){return c.id===id1});var c2=d.categories.find(function(c){return c.id===id2});if(!c1||!c2)return;var t=c1.order;c1.order=c2.order;c2.order=t;save(d);renderL1()}

// ==================== L2: Items ====================
function renderL2(catId){
  var cat=findCat(catId);if(!cat)return;
  cat.items.sort(function(a,b){return a.order-b.order});
  itemGrid.innerHTML='';
  // Single item: 1 column centered; multiple: 2 columns
  itemGrid.style.gridTemplateColumns=cat.items.length===1?'1fr':'1fr 1fr';
  itemGrid.style.maxWidth=cat.items.length===1?'200px':'';itemGrid.style.margin=cat.items.length===1?'0 auto':'';
  var data=load();var catIdx=data.categories.findIndex(function(c){return c.id===catId});
  if(catIdx<0)catIdx=0;
  var catHue=catIdx*Math.floor(360/Math.max(data.categories.length,1));

  cat.items.forEach(function(item,i){
    var card=document.createElement('div');
    card.className='item-card';
    card.style.backgroundColor=itemColor(catHue,i,cat.items.length);
    card.innerHTML='<div class="item-name">'+escHtml(item.name)+'</div><div class="item-meta">'+(item.text?item.text.length:0)+' 字</div>';

    // Tap detection without 300ms delay
    var touchStartTime=0,touchMoved=false;
    card.addEventListener('touchstart',function(){touchStartTime=Date.now();touchMoved=false});
    card.addEventListener('touchmove',function(){touchMoved=true});
    card.addEventListener('touchend',function(){
      if(!touchMoved&&Date.now()-touchStartTime<400){
        currentItemId=item.id;
        renderL3(catId,item.id);
        goTo(pageL3,item.name,true);
      }
    });
    itemGrid.appendChild(card);
  });

  // "+" button: create new item
  addBtn.onclick=function(){showItemEditor(catId,null)};
}

// ==================== L3: QR Detail ====================
function renderL3(catId,itemId){
  var cat=findCat(catId);var item=findItem(cat,itemId);if(!item)return;
  document.getElementById('qrWhite').innerHTML='';
  document.getElementById('l3Meta').textContent=item.text.length+' 字';
  document.getElementById('l3PrivacyHint').textContent='此二维码含医疗文本，使用后请关闭页面\n请确认模板中的占位符已替换为实际数值后再录入';
  genQR(item.text,Math.min(window.innerWidth*0.8,500),function(c){if(c)document.getElementById('qrWhite').appendChild(c)});
  document.getElementById('editItemBtn').onclick=function(){showItemEditor(catId,itemId)};
  document.getElementById('deleteItemBtn').onclick=function(){
    if(!confirm('确定删除'+item.name+'？'))return;
    cat.items=cat.items.filter(function(i){return i.id!==itemId});
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});if(ci>=0)d.categories[ci]=cat;save(d);
    renderL2(catId);goTo(pageL2,cat.name,true);addBtn.classList.add('visible');toast('已删除');
  };
}

// ==================== Item Editor (inline modal) ====================
function showItemEditor(catId,itemId){
  var cat=findCat(catId);var item=itemId?findItem(cat,itemId):null;
  var isNew=!item;
  var title=isNew?'新增子类':'编辑: '+(item?item.name:'');

  var h='<div class="modal-header"><h2>'+escHtml(title)+'</h2><button class="modal-close-btn" id="editorClose">&times;</button></div>';
  h+='<div class="editor-label">名称</div>';
  h+='<input type="text" class="editor-input" id="editorName" value="'+escHtml(item?item.name:'')+'" placeholder="子类名称">';
  h+='<div class="editor-label">文本内容</div>';
  h+='<textarea class="editor-textarea" id="editorText" placeholder="输入文本内容...">'+escHtml(item?item.text:'')+'</textarea>';
  h+='<div style="margin-top:16px"><button class="btn" id="editorSave">保存</button></div>';
  if(!isNew){h+='<div style="margin-top:8px"><button class="btn-sm danger" id="editorDeleteItem" style="width:100%">删除此子类</button></div>'}

  document.getElementById('settingsContent').innerHTML=h;
  document.getElementById('settingsModal').classList.add('open');

  document.getElementById('editorClose').onclick=function(){document.getElementById('settingsModal').classList.remove('open')};
  document.getElementById('editorSave').onclick=function(){
    var name=document.getElementById('editorName').value.trim();
    var text=document.getElementById('editorText').value.trim();
    if(!name){toast('请输入名称');return}
    if(!text){toast('请输入文本内容');return}
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});
    if(ci<0){toast('分类不存在');return}
    if(isNew){
      d.categories[ci].items.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name,text:text,order:d.categories[ci].items.length});
      currentCatId=catId;
    }else{
      var it=findItem(d.categories[ci],itemId);if(it){it.name=name;it.text=text}
    }
    save(d);
    document.getElementById('settingsModal').classList.remove('open');
    renderL2(catId);
    if(!pageL2.classList.contains('active')){goTo(pageL2,d.categories[ci].name,true);addBtn.classList.add('visible');isSearchMode=false}
    toast(isNew?'已添加: '+name:'已更新');
  };
  if(!isNew){document.getElementById('editorDeleteItem').onclick=function(){
    if(!confirm('确定删除此子类？'))return;
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});if(ci<0)return;
    d.categories[ci].items=d.categories[ci].items.filter(function(i){return i.id!==itemId});save(d);
    document.getElementById('settingsModal').classList.remove('open');renderL2(catId);
    if(pageL3.classList.contains('active')){goTo(pageL2,d.categories[ci].name,true);addBtn.classList.add('visible')}
    toast('已删除');
  }}
}

// ==================== Settings ====================
var settingsModal=document.getElementById('settingsModal');
document.getElementById('settingsBtn').addEventListener('click',openSettings);
settingsModal.addEventListener('click',function(e){if(e.target===settingsModal)settingsModal.classList.remove('open')});

function openSettings(){
  var data=load();
  var h='<div class="modal-header"><h2>设置</h2><button class="modal-close-btn" id="closeSettings">&times;</button></div>';

  // Presets
  h+='<div class="section-title">快速开始</div>';
  h+='<button class="btn-sm" id="loadPresets" style="width:100%;margin-bottom:4px">载入医院常用模板</button>';
  h+='<div style="font-size:11px;color:#555;margin-bottom:12px">不会覆盖已有数据，追加到末尾</div>';

  // Categories
  h+='<div class="section-title">分类管理</div>';
  h+='<div class="settings-list" id="settingsCatList">';
  data.categories.forEach(function(cat){
    h+='<div class="settings-item" data-cid="'+cat.id+'"><span class="si-name">'+escHtml(cat.name)+'</span><span class="si-meta">'+cat.items.length+' 项 <span class="si-arrow">&#x203A;</span></span></div>';
  });
  h+='</div>';
  h+='<button class="btn-sm secondary" id="newCatBtn" style="width:100%;margin-top:8px">+ 新增分类</button>';

  // Import from file (no server needed)
  h+='<div class="section-title">从文件导入</div>';
  h+='<input type="file" id="importFileInput" accept=".json" style="display:none">';
  h+='<button class="btn-sm" id="importFromFileBtn" style="width:100%;margin-bottom:4px">选择 JSON 文件导入</button>';
  h+='<div style="font-size:11px;color:#555;margin-bottom:12px">从手机本地文件导入全部数据（替换现有数据）</div>';
  h+='<div class="section-title">手动导入导出</div>';
  h+='<button class="btn-sm secondary" id="exportBtn" style="width:100%;margin-bottom:4px">导出（显示JSON）</button>';
  h+='<div id="exportArea" style="display:none;margin-bottom:8px"><textarea id="exportText" style="width:100%;height:120px;background:#0f0f1a;border:1px solid #333;border-radius:8px;color:#aaa;font-size:11px;padding:8px;resize:none" readonly></textarea><button class="btn-sm" id="copyExportBtn" style="width:100%;margin-top:4px">复制到剪贴板</button></div>';
  h+='<button class="btn-sm secondary" id="importBtn" style="width:100%;margin-bottom:4px">导入（粘贴JSON）</button>';
  h+='<div id="importArea" style="display:none;margin-bottom:8px"><textarea id="importText" placeholder="在此粘贴 JSON..." style="width:100%;height:120px;background:#0f0f1a;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-size:12px;padding:8px;resize:none"></textarea><button class="btn-sm" id="doImportBtn" style="width:100%;margin-top:4px">执行导入</button></div>';
  h+='<div class="section-title">数据安全</div>';
  h+='<button class="btn-sm danger" id="clearAllDataBtn" style="width:100%">清除全部数据</button>';
  h+='<div style="font-size:11px;color:#555;margin-top:4px">删除所有分类和子类数据，无法恢复</div>';

  settingsContent.innerHTML=h;
  document.getElementById('closeSettings').onclick=function(){settingsModal.classList.remove('open')};

  // Category tap → drill into items
  settingsContent.querySelectorAll('.settings-item').forEach(function(el){
    el.addEventListener('click',function(){showCatItemsEditor(el.dataset.cid)});
  });

  // New category
  document.getElementById('newCatBtn').onclick=function(){
    var name=prompt('新分类名称：');if(!name||!name.trim())return;
    var d=load();d.categories.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name.trim(),order:d.categories.length,items:[]});save(d);
    renderL1();openSettings();toast('已添加分类: '+name.trim());
  };

  // Load presets (built-in, no server needed)
  document.getElementById('loadPresets').onclick=function(){
    var d=load();
    if(d.categories.length>0){if(!confirm('已有数据，追加到末尾？'))return}
    var p={categories:getPresets()};
    d.categories=d.categories.concat(p.categories);save(d);renderL1();openSettings();toast('已追加 '+p.categories.length+' 个分类');
  };

  // Import from file (replace all data)
  document.getElementById('importFileInput').onchange=function(){
    var file=this.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var d=JSON.parse(e.target.result);
        if(!d.categories)throw new Error();
        if(!confirm('将从文件导入 '+d.categories.length+' 个分类，手机现有数据将被替换。继续？'))return;
        save(d);renderL1();openSettings();toast('已导入 '+d.categories.length+' 个分类');
      }catch(ex){toast('JSON 格式无效')}
    };
    reader.readAsText(file);
  };
  document.getElementById('importFromFileBtn').onclick=function(){
    document.getElementById('importFileInput').click();
  };

  // Export
  document.getElementById('exportBtn').onclick=function(){
    var area=document.getElementById('exportArea');
    if(area.style.display==='none'){area.style.display='block';document.getElementById('exportText').value=JSON.stringify(load(),null,2)}else{area.style.display='none'}
  };
  document.getElementById('copyExportBtn').onclick=function(){
    var txt=document.getElementById('exportText');
    txt.select();txt.setSelectionRange(0,99999);
    navigator.clipboard.writeText(txt.value).then(function(){toast('已复制')}).catch(function(){toast('请手动全选复制')});
  };

  // Import
  document.getElementById('importBtn').onclick=function(){
    var area=document.getElementById('importArea');
    area.style.display=area.style.display==='none'?'block':'none';
  };
  document.getElementById('doImportBtn').onclick=function(){
    var txt=document.getElementById('importText').value.trim();if(!txt){toast('请粘贴JSON') ;return}
    try{var d=JSON.parse(txt);if(!d.categories)throw new Error();var existing=load();existing.categories=existing.categories.concat(d.categories);save(existing);renderL1();openSettings();toast('已导入 '+d.categories.length+' 个分类')}catch(e){toast('JSON格式无效')}
  };
  document.getElementById('clearAllDataBtn').onclick=function(){
    if(!confirm('确定清除全部数据？\n\n此操作将删除所有分类和子类数据，且无法恢复。建议先导出一份 JSON 备份。'))return;
    save({categories:[]});renderL1();openSettings();toast('已清除全部数据');
  };

  settingsModal.classList.add('open');
}

// ==================== Settings: Cat items editor ====================
function showCatItemsEditor(catId){
  var cat=findCat(catId);if(!cat)return;
  var h='<div class="modal-header"><button class="modal-close-btn" id="catItemsBack" style="font-size:18px">&#x2039; 返回</button><h2 style="text-align:center">'+escHtml(cat.name)+'</h2><div style="width:30px"></div></div>';

  h+='<div class="editor-label">分类名称</div>';
  h+='<input type="text" class="editor-input" id="catNameEdit" value="'+escHtml(cat.name)+'">';

  h+='<div class="editor-label">子类列表</div>';
  cat.items.sort(function(a,b){return a.order-b.order}).forEach(function(item){
    h+='<div class="settings-item item-edit-row" data-iid="'+item.id+'" style="flex-wrap:wrap">';
    h+='<span class="si-name" style="width:100%">'+escHtml(item.name)+'</span>';
    h+='<span class="si-meta">'+item.text.length+' 字 — 点击编辑</span>';
    h+='</div>';
  });

  h+='<button class="btn-sm secondary" id="addItemInSettings" style="width:100%;margin-top:8px">+ 新增子类</button>';
  h+='<button class="btn-sm danger" id="delCatInSettings" style="width:100%;margin-top:8px">删除整个分类</button>';

  document.getElementById('settingsContent').innerHTML=h;

  document.getElementById('catItemsBack').onclick=function(){openSettings()};

  // Tap item → open editor
  document.querySelectorAll('.item-edit-row').forEach(function(el){
    el.addEventListener('click',function(){showItemEditor(catId,el.dataset.iid)});
  });

  // Add new item
  document.getElementById('addItemInSettings').onclick=function(){showItemEditor(catId,null)};

  // Rename category on blur
  document.getElementById('catNameEdit').addEventListener('change',function(){
    var d=load();var ci=d.categories.findIndex(function(c){return c.id===catId});if(ci>=0){d.categories[ci].name=this.value.trim()||d.categories[ci].name;save(d);renderL1()}
  });

  // Delete category
  document.getElementById('delCatInSettings').onclick=function(){
    if(!confirm('确定删除「'+cat.name+'」及所有 '+cat.items.length+' 个子类？'))return;
    var d=load();d.categories=d.categories.filter(function(c){return c.id!==catId});save(d);renderL1();openSettings();toast('已删除: '+cat.name);
  };
}

// ==================== Siri Search ====================
function siriSearch(q){
  var data=load();var results=[];
  data.categories.forEach(function(cat){cat.items.forEach(function(item){if(item.name.toLowerCase().indexOf(q.toLowerCase())!==-1)results.push({catName:cat.name,catId:cat.id,itemId:item.id,itemName:item.name,text:item.text})})});
  if(results.length===0){toast('未找到: '+q);return}
  if(results.length===1){var r=results[0];currentCatId=r.catId;currentItemId=r.itemId;renderL3(r.catId,r.itemId);goTo(pageL3,r.itemName,true);return}
  // Multiple results
  isSearchMode=true;currentCatId=results[0].catId;itemGrid.innerHTML='';
  itemGrid.style.gridTemplateColumns=results.length===1?'1fr':'1fr 1fr';
  itemGrid.style.maxWidth=results.length===1?'200px':'';itemGrid.style.margin=results.length===1?'0 auto':'';
  results.forEach(function(r){
    var card=document.createElement('div');card.className='item-card';card.style.backgroundColor='hsl(220,40%,35%)';
    card.innerHTML='<div class="item-name">'+escHtml(r.itemName)+'</div><div class="item-meta">'+escHtml(r.catName)+' · '+r.text.length+'字</div>';
    var ts=0,tm=false;card.addEventListener('touchstart',function(){ts=Date.now();tm=false});card.addEventListener('touchmove',function(){tm=true});
    card.addEventListener('touchend',function(){if(!tm&&Date.now()-ts<400){currentCatId=r.catId;currentItemId=r.itemId;renderL3(r.catId,r.itemId);goTo(pageL3,r.itemName,true)}});
    itemGrid.appendChild(card);
  });
  addBtn.classList.remove('visible');goTo(pageL2,'搜索: '+q,true);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ==================== Service Worker ====================
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}

if(!localStorage.getItem(DISCLAIMER_KEY)){
  document.getElementById('disclaimerModal').classList.add('open');
  document.getElementById('disclaimerAccept').addEventListener('click',function(){
    localStorage.setItem(DISCLAIMER_KEY,'1');
    document.getElementById('disclaimerModal').classList.remove('open');
  });
}

renderL1();
var params=new URLSearchParams(window.location.search);var q=params.get('q');if(q){setTimeout(function(){siriSearch(q)},300)}
